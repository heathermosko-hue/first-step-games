name: Deploy to InMotion Hosting

on:
  push:
    branches:
      - platform-updates-may-2026

jobs:
  ssh-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via SSH/SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 192.145.235.207
          username: firststep
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: "*.html,fonts.css,site-nav.js,icons/"
          target: /public_html/reading-games/
          overwrite: true
          rm: false
