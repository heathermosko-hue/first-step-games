<a href="../hub.html" class="back-link">← Back to Games</a>

<script>
  function showMemberLogin() {
    if (document.getElementById('mbr-overlay')) return;
    var overlay = document.createElement('div');
    overlay.id = 'mbr-overlay';
    overlay.setAttribute('role','dialog');
    overlay.setAttribute('aria-modal','true');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:20px;padding:2rem 1.8rem;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.35);text-align:center;font-family:'Comic Sans MS','Comic Neue',cursive;">
        <div style="font-size:2.5rem;margin-bottom:0.5rem;">⭐</div>
        <h2 style="font-size:1.5rem;color:#2C3E50;margin-bottom:0.3rem;">Member Login</h2>
        <p style="color:#666;font-size:0.9rem;margin-bottom:1.3rem;">Enter your First Step Reading email and password</p>
        <input id="mbr-email" type="email" placeholder="Email address"
          style="width:100%;padding:0.7rem 1rem;border:2px solid #e0e0e0;border-radius:10px;font-family:inherit;font-size:1rem;margin-bottom:0.7rem;outline:none;box-sizing:border-box;"
          onkeydown="if(event.key==='Enter')mbrSubmit()"
          onfocus="this.style.borderColor='#6B48FF'" onblur="this.style.borderColor='#e0e0e0'">
        <input id="mbr-password" type="password" placeholder="Password"
          style="width:100%;padding:0.7rem 1rem;border:2px solid #e0e0e0;border-radius:10px;font-family:inherit;font-size:1rem;margin-bottom:0.3rem;outline:none;box-sizing:border-box;"
          onkeydown="if(event.key==='Enter')mbrSubmit()"
          onfocus="this.style.borderColor='#6B48FF'" onblur="this.style.borderColor='#e0e0e0'">
        <div id="mbr-error" style="color:#e74c3c;font-size:0.85rem;min-height:1.2rem;margin-bottom:0.7rem;"></div>
        <button id="mbr-btn" onclick="mbrSubmit()"
          style="width:100%;padding:0.8rem;background:linear-gradient(135deg,#6B48FF,#3A8EF6);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:1.05rem;cursor:pointer;margin-bottom:0.8rem;">
          🔐 Sign In
        </button>
        <a href="https://www.firststepreading.com/my-account/lost-password/" target="_blank"
          style="display:block;font-size:0.82rem;color:#888;margin-bottom:0.8rem;text-decoration:none;">
          Forgot your password?
        </a>
        <button onclick="document.getElementById('mbr-overlay').remove();"
          style="background:none;border:none;color:#aaa;font-size:0.82rem;cursor:pointer;font-family:inherit;">
          ✕ Close
        </button>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('mbr-email').focus();
  }

  async function mbrSubmit() {
    var email    = document.getElementById('mbr-email').value.trim();
    var password = document.getElementById('mbr-password').value;
    var errEl    = document.getElementById('mbr-error');
    var btn      = document.getElementById('mbr-btn');
    errEl.innerHTML = '';
    if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
    btn.textContent = '⏳ Signing in…';
    btn.disabled = true;
    try {
      var fd = new FormData();
      fd.append('email', email);
      fd.append('password', password);
      var res  = await fetch('member-login.php', { method: 'POST', body: fd });
      var data = await res.json();
      if (data.success) {
        sessionStorage.setItem('fsr_access_type', 'member');
        sessionStorage.setItem('fsr_member_name', data.name || 'Member');
        window.location.href = '../hub.html';
      } else {
        errEl.innerHTML = data.error || 'Incorrect email or password.';
        btn.textContent = '🔐 Sign In';
        btn.disabled = false;
      }
    } catch(e) {
      errEl.textContent = 'Connection error. Please try again.';
      btn.textContent = '🔐 Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
