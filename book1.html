function loadVoices(){voices=speechSynthesis.getVoices();if(!voices.length)speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};}
loadVoices();
function getBestVoice(){const en=voices.filter(v=>/^en/i.test(v.lang));return en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\b(jenny|emma)\b/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/female/i.test(v.name))||en.find(v=>/\b(samantha|karen|moira|serena|victoria|tessa|fiona|kate|zoe|allison|ava|zira|eva|hazel|susan)\b/i.test(v.name))||en.find(v=>/natural|neural|online/i.test(v.name))||en.find(v=>/google.*english/i.test(v.name))||en[0]||voices[0];}
let soundOn=true;
function speak(text,spanEl){if(!soundOn)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text.trim());const v=getBestVoice();if(v)u.voice=v;u.lang='en-US';u.rate=0.9;u.pitch=1.0;u.volume=1;u.onstart=()=>{ring.classList.add('on');if(spanEl)spanEl.classList.add('speaking');document.getElementById('btn-read').classList.add('reading');var mr=document.getElementById('mob-read-btn');if(mr)mr.classList.add('reading');};u.onend=()=>{ring.classList.remove('on');if(spanEl)spanEl.classList.remove('speaking');document.getElementById('btn-read').classList.remove('reading');var mr=document.getElementById('mob-read-btn');if(mr)mr.classList.remove('reading');};speechSynthesis.speak(u);}
function toggleRead(){if(speechSynthesis.speaking){speechSynthesis.cancel();ring.classList.remove('on');document.getElementById('btn-read').classList.remove('reading');var mr=document.getElementById('mob-read-btn');if(mr)mr.classList.remove('reading');}else{speak(PAGE_TEXT[currentPage]||'');}}
function toggleSound(){soundOn=!soundOn;if(!soundOn){speechSynthesis.cancel();ring.classList.remove('on');document.getElementById('btn-read').classList.remove('reading');var mr=document.getElementById('mob-read-btn');if(mr)mr.classList.remove('reading');}document.querySelectorAll('.sound-btn').forEach(function(el){el.textContent=soundOn?'🔊 Sound':'🔇 Muted';});}
ring.addEventListener('click',toggleRead);
document.getElementById('btn-read').addEventListener('click',toggleRead);
const mobRead=document.getElementById('mob-read-btn');if(mobRead)mobRead.addEventListener('click',toggleRead);
let flashWords=[],flashIdx=0;
function openFlash(words,title){flashWords=words;flashIdx=0;document.getElementById('flash-title').textContent=title;showCard();document.getElementById('flash-modal').style.display='flex';}
function showCard(){const w=flashWords[flashIdx]||'';document.getElementById('flash-word').textContent=w.toLowerCase();document.getElementById('flash-counter').textContent=(flashIdx+1)+' / '+flashWords.length;document.getElementById('flash-prev').disabled=flashIdx===0;document.getElementById('flash-next').disabled=flashIdx>=flashWords.length-1;speak(w);}
flashBtn.addEventListener('click',()=>openFlash(SIGHT_WORDS[currentPage]||[],'Sight Words'));
wordsBtn.addEventListener('click',()=>openFlash(WORD_FAMILIES[currentPage]||[],'Word Families'));
hwBtn.addEventListener('click',()=>{window.open('hw-pdf.html?book=1&ch='+currentPage,'_blank');});
onlineBtn.addEventListener('click',()=>{window.location.href='online-hw.html?book=1&ch='+currentPage;});
document.getElementById('flash-speak').addEventListener('click',()=>speak(flashWords[flashIdx]||''));
document.getElementById('flash-prev').addEventListener('click',()=>{if(flashIdx>0){flashIdx--;showCard();}});
document.getElementById('flash-next').addEventListener('click',()=>{if(flashIdx<flashWords.length-1){flashIdx++;showCard();}});
document.getElementById('flash-close').addEventListener('click',()=>{speechSynthesis.cancel();document.getElementById('flash-modal').style.display='none';});
document.getElementById('flash-modal').addEventListener('click',e=>{if(e.target===document.getElementById('flash-modal')){speechSynthesis.cancel();document.getElementById('flash-modal').style.display='none';}});
async function renderPage(num,dir){
  if(animating)return;animating=true;
  if(canvasContainer.style.display!=='none'){canvasContainer.classList.add(dir==='fwd'?'anim-exit-left':'anim-exit-right');await new Promise(r=>setTimeout(r,400));canvasContainer.classList.remove('anim-exit-left','anim-exit-right');}
  canvasContainer.style.display='none';textLayerDiv.innerHTML='';loading.style.display='block';
  const page=await pdfDoc.getPage(num);
  const vp=page.getViewport({scale:1});
  const pw=document.getElementById('page-wrapper');
  const isMob=window.innerWidth<=600;
  const maxW=isMob?pw.clientWidth:Math.min(490,pw.clientWidth-20);
  const maxH=isMob?(window.innerHeight-44):560;
  const sc=Math.min(maxW/vp.width,maxH/vp.height);const sv=page.getViewport({scale:sc});
  canvas.width=sv.width;canvas.height=sv.height;
  await page.render({canvasContext:ctx,viewport:sv}).promise;
  const tc=await page.getTextContent();
  try{if(typeof pdfjsLib.renderTextLayer==='function'){const rt=pdfjsLib.renderTextLayer({textContent:tc,container:textLayerDiv,viewport:sv,textDivs:[]});if(rt&&rt.promise)await rt.promise;}}catch(e){}
  textLayerDiv.querySelectorAll('span').forEach(span=>{
    const raw=span.textContent.trim();
    if(!raw||/^\d+$/.test(raw)||/^[.,!?;:'"()\-]+$/.test(raw))return;
    span.addEventListener('click',e=>{e.stopPropagation();speak(raw,span);});
  });
  loading.style.display='none';canvasContainer.style.display='block';
  canvasContainer.classList.add(dir==='fwd'?'anim-enter-right':'anim-enter-left');
  await new Promise(r=>setTimeout(r,ANIM_MS));canvasContainer.classList.remove('anim-enter-right','anim-enter-left');
  currentPage=num;counter.textContent=num+' / '+TOTAL;
  const mc=document.getElementById('mob-counter');if(mc)mc.textContent=num+' / '+TOTAL;
  document.getElementById('btn-back').disabled=num<=1;document.getElementById('btn-next').disabled=num>=TOTAL;
  const isHdr=HEADER_PAGES.has(num);
  flashBtn.style.display=(isHdr&&SIGHT_WORDS[num])?'inline-block':'none';
  wordsBtn.style.display=(isHdr&&WORD_FAMILIES[num])?'inline-block':'none';
  hwBtn.style.display=isHdr?'inline-block':'none';
  onlineBtn.style.display=isHdr?'inline-block':'none';
  // mobile menu buttons — grey out unavailable ones
  const mbtnFlash=document.getElementById('mbtn-flash');
  const mbtnWords=document.getElementById('mbtn-words');
  const mbtnHw=document.getElementById('mbtn-hw');
  const mbtnOnline=document.getElementById('mbtn-online');
  if(mbtnFlash){mbtnFlash.disabled=!(isHdr&&SIGHT_WORDS[num]);mbtnFlash.style.opacity=(isHdr&&SIGHT_WORDS[num])?'1':'.35';}
  if(mbtnWords){mbtnWords.disabled=!(isHdr&&WORD_FAMILIES[num]);mbtnWords.style.opacity=(isHdr&&WORD_FAMILIES[num])?'1':'.35';}
  if(mbtnHw){mbtnHw.disabled=!isHdr;mbtnHw.style.opacity=isHdr?'1':'.35';}
  if(mbtnOnline){mbtnOnline.disabled=!isHdr;mbtnOnline.style.opacity=isHdr?'1':'.35';}
  animating=false;
}
document.getElementById('btn-next').addEventListener('click',()=>{if(currentPage<TOTAL)renderPage(currentPage+1,'fwd');});
document.getElementById('btn-back').addEventListener('click',()=>{if(currentPage>1)renderPage(currentPage-1,'back');});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')document.getElementById('btn-next').click();if(e.key==='ArrowLeft')document.getElementById('btn-back').click();if(e.key==='Escape'){speechSynthesis.cancel();document.getElementById('flash-modal').style.display='none';}});
pdfjsLib.getDocument({url:'book1.pdf?v=2',disableRange:false,disableStream:false,disableAutoFetch:true}).promise.then(doc=>{pdfDoc=doc;const startPg=Math.min(Math.max(parseInt(new URLSearchParams(location.search).get('page'))||1,1),doc.numPages);return renderPage(startPg,'fwd');}).catch(err=>{loading.textContent='Error: '+err.message;});
document.getElementById('btn-games').addEventListener('click',function(){speechSynthesis.cancel();});
var _mobHub=document.getElementById('mob-hub');if(_mobHub)_mobHub.addEventListener('click',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
function toggleChPanel(force){const p=document.getElementById('chPanel');const isOpen=p.classList.contains('open');if(force===false||isOpen){p.classList.remove('open');}else{p.classList.add('open');buildChList();}}
function buildChList(){const list=document.getElementById('chList');list.innerHTML='';const pages=[...HEADER_PAGES].sort((a,b)=>a-b);pages.forEach(pg=>{const raw=PAGE_TEXT[pg]||'';let title=(raw.split(' Words:')[0]||'').replace(/Chapter \d+:\s*[^.]+\.\s*/g,'').replace(/Short Vowel \w+\.\s*/g,'').replace(/\.$/, '').trim()||'Page '+pg;if(title.length>26)title=title.substring(0,26)+'…';const btn=document.createElement('button');btn.className='ch-btn'+(pg===currentPage?' active':'');btn.innerHTML='<span style="color:#7fe87a;font-size:.68rem">p.'+pg+'</span><br>'+title;btn.onclick=()=>{renderPage(pg,'fwd');toggleChPanel(false);};list.appendChild(btn);});}
document.addEventListener('click',e=>{const p=document.getElementById('chPanel');if(p.classList.contains('open')&&!p.contains(e.target)&&!document.getElementById('chTab').contains(e.target)&&!document.getElementById('mob-chaps-btn').contains(e.target)){p.classList.remove('open');}const mm=document.getElementById('mobile-menu');const mb=document.getElementById('mob-menu-btn');if(mm&&mm.classList.contains('open')&&!mm.contains(e.target)&&e.target!==mb){mm.classList.remove('open');}});
function toggleMobileMenu(){const mm=document.getElementById('mobile-menu');mm.classList.toggle('open');}
</script>
