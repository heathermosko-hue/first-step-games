<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Bubble Pop! | First Step Reading</title>
<style>
:root { --accent:#3A8EF6; --accent2:#6B48FF; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  height:100dvh; overflow:hidden;
  display:flex; flex-direction:column;
  background: url('icons/bg-bubble-pop.png') center/cover no-repeat fixed, #7EC8A0;
  user-select:none; -webkit-tap-highlight-color:transparent;
}

/* ── HEADER ── */
header{
  background:var(--accent);
  padding:.3rem 1rem;
  display:flex; align-items:center; gap:.7rem;
  flex-shrink:0; z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.back-link{
  color:white; text-decoration:none; font-weight:bold;
  background:rgba(255,255,255,.22); padding:6px 14px;
  border-radius:999px; font-size:.82rem; white-space:nowrap;
  transition:background .2s; font-family:"Comic Sans MS","Comic Sans",sans-serif;
}
.back-link:hover{ background:rgba(255,255,255,.38); }
header h1{
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; color:white;
  font-size:clamp(1.05rem,4vw,1.45rem); flex:1; text-align:center;
}
.header-right{
  display:flex; align-items:center; gap:.45rem; flex-shrink:0;
}
.score-badge{
  background:rgba(255,255,255,.25); color:white;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; font-size:.92rem;
  padding:5px 13px; border-radius:999px; white-space:nowrap;
}
.speaker-btn{
  background:rgba(255,255,255,.22); border:none; color:white;
  font-size:1.15rem; width:36px; height:36px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .2s; flex-shrink:0;
}
.speaker-btn:hover{ background:rgba(255,255,255,.38); }
.speaker-btn.muted{ background:rgba(0,0,0,.28); opacity:.7; }

/* ── CATEGORY BAR ── */
.cat-bar{
  background:rgba(255,255,255,0.82); border-bottom:3px solid rgba(0,0,0,.07);
  padding:.38rem .5rem; display:flex; gap:.32rem;
  flex-wrap:nowrap; overflow-x:auto; flex-shrink:0;
  scrollbar-width:none; backdrop-filter:blur(4px);
}
.cat-bar::-webkit-scrollbar{ display:none; }
.btn-cat{
  border:2px solid #ddd; background:white; color:#888;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold;
  font-size:.7rem; padding:4px 11px; border-radius:999px;
  cursor:pointer; white-space:nowrap; transition:all .2s; flex-shrink:0;
}
.btn-cat.active{ background:var(--accent); border-color:var(--accent); color:white; }

/* ── PROMPT ── */
.prompt-area{
  background:rgba(255,255,255,0.82); border-bottom:3px solid rgba(0,0,0,.06); backdrop-filter:blur(4px);
  padding:.3rem 1rem; display:flex; align-items:center;
  gap:.9rem; flex-shrink:0; justify-content:center;
  min-height:58px;
}
.prompt-pic{
  font-size:2.4rem; line-height:1; flex-shrink:0;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.12));
}
.prompt-pic svg{ width:2.4rem; height:2.4rem; }
.prompt-pic.word{
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold;
  font-size:clamp(1.7rem,6vw,2.2rem); color:var(--accent);
  background:#EDF6FF; padding:4px 18px; border-radius:12px;
  filter:none;
}
.prompt-text{ display:flex; flex-direction:column; }
.prompt-hint{
  color:#555; font-size:.78rem; font-weight:bold;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  letter-spacing:.01em;
}
.prompt-sub{
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; font-size:1rem; color:#333; margin-top:2px;
}

/* ── LIVES ── */
.lives-bar{
  padding:.22rem 1rem; text-align:center; font-size:1.35rem;
  flex-shrink:0; background:rgba(255,255,255,.45); letter-spacing:.1rem; backdrop-filter:blur(2px);
}

/* ── GAME FIELD ── */
.game-field{
  flex:1; position:relative; overflow:hidden;
  background:transparent;
}

/* ── BUBBLES ── */
.bubble{
  position:absolute; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; touch-action:manipulation;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; text-align:center; line-height:1.1;
  border:none; box-shadow:none;
  background-size:cover; background-repeat:no-repeat; background-position:center;
  overflow:hidden; will-change:top;
  transition:transform .08s;
}
.bubble:active{ transform:scale(.92) !important; }
.b-word{
  position:relative; z-index:1; padding:3px; word-break:break-word;
  color:white; text-shadow:0 1px 4px rgba(0,0,0,.55), 0 0 8px rgba(0,0,0,.3);
}

/* Pop animations */
@keyframes popOK{
  0%  { transform:scale(1);   opacity:1; }
  45% { transform:scale(1.7); opacity:.85; }
  100%{ transform:scale(.05); opacity:0; }
}
@keyframes popNo{
  0%,100%{ transform:scale(1) rotate(0); }
  25%    { transform:scale(.88) rotate(-6deg); }
  75%    { transform:scale(.88) rotate( 6deg); }
}
.bubble.pop-ok { animation:popOK .32s forwards; pointer-events:none; }
.bubble.pop-no { animation:popNo .38s; }

/* Score burst */
@keyframes scoreBurst{
  0%  { transform:translateY(0)    scale(1);   opacity:1; }
  100%{ transform:translateY(-55px) scale(1.4); opacity:0; }
}
.score-burst{
  position:absolute; pointer-events:none; z-index:60;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; font-size:1.35rem; color:#FFD700;
  text-shadow:0 1px 4px rgba(0,0,0,.25);
  animation:scoreBurst .75s forwards;
}

/* Sparkles */
@keyframes sparkFly{
  0%  { transform:translate(0,0) scale(1.1); opacity:1; }
  100%{ transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}
.sparkle{
  position:absolute; pointer-events:none; z-index:55;
  font-size:1.2rem;
  animation:sparkFly .6s forwards;
}

/* ── OVERLAY ── */
.overlay{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,20,60,.42); z-index:100; backdrop-filter:blur(2px);
}
.overlay-card{
  background:white; border-radius:26px;
  padding:2rem 2.2rem; text-align:center;
  max-width:320px; width:90%;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
}
.overlay-card h2{
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold;
  font-size:2rem; color:var(--accent); margin-bottom:.4rem;
}
.overlay-card p{
  color:#999; font-size:.9rem; font-weight:bold;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  margin-bottom:1rem;
}
.final-score{
  display:none;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold;
  font-size:2.2rem; color:#F5A623;
  margin:.4rem 0 1rem;
}
.btn-play{
  background:var(--accent); color:white; border:none;
  font-family:"Comic Sans MS","Comic Sans",sans-serif;
  font-weight:bold; font-size:1.1rem;
  padding:13px 0; border-radius:999px; cursor:pointer; width:100%;
  box-shadow:0 5px 16px rgba(58,142,246,.45); transition:opacity .2s;
}
.btn-play:hover{ opacity:.88; }

@media(max-width:480px){
  .prompt-pic{ font-size:2rem; }
  .prompt-pic.word{ font-size:1.5rem; }
}
@media(max-height:640px){
  header{ padding:.2rem .8rem; }
  .cat-bar{ padding:.22rem .5rem; }
  .prompt-area{ padding:.18rem .8rem; min-height:46px; }
  .prompt-pic{ font-size:1.8rem; }
  .lives-bar{ padding:.1rem 1rem; font-size:1.1rem; }
}
@media(max-height:520px){
  .prompt-area{ min-height:38px; padding:.1rem .6rem; }
  .prompt-pic{ font-size:1.4rem; }
  .prompt-hint{ font-size:.68rem; }
  .prompt-sub{ font-size:.85rem; }
  .lives-bar{ font-size:.9rem; }
}

const BUBBLE_IMGS = [
  'icons/bubble-pink.png','icons/bubble-blue.png','icons/bubble-green.png',
  'icons/bubble-yellow.png','icons/bubble-purple.png'

/* ═══════════════════════ STATE ═══════════════════════ */
let catKey = 'letters';
let target  = null;
let bubbles = [];

let lives   = 3;
let running = false;
let animId  = null;
let bId     = 0;
const MAX_B = 6;

/* ═══════════════════════ VOICE ═══════════════════════ */
let voiceEnabled = true;
let bestVoice    = null;
let voiceReady   = false;

function loadBestVoice(){
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;
  voiceReady = true;
  const en=voices.filter(v=>/^en/i.test(v.lang));
  bestVoice=en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))
    ||en.find(v=>/\bjenny\b|\bemma\b/i.test(v.name)&&/natural/i.test(v.name))
    ||en.find(v=>/\bsamantha\b|\bkaren\b|\bmoira\b|\bserena\b|\bvictoria\b/i.test(v.name))
    ||en.find(v=>/natural|online|neural/i.test(v.name))
    ||en.find(v=>/google.*english/i.test(v.name))
    ||en[0]||voices[0]||null;
}

speechSynthesis.addEventListener('voiceschanged', loadBestVoice);
loadBestVoice();

function _utt(text, rate, pitch){
  const u = new SpeechSynthesisUtterance(text);
  u.rate  = rate  || 0.88;
  u.pitch = pitch || 1.0;
  u.lang  = 'en-US';
  if(bestVoice) u.voice = bestVoice;
  return u;
}

function _ready(){
  try{ if(speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}
}

/* Speak one phrase immediately */
function speakOnly(text, rate=0.88){
  if(!voiceEnabled) return;
  try{
    speechSynthesis.cancel();
    _ready();
    speechSynthesis.speak(_utt(text, rate, 1.08));
  }catch(e){}
}

/* Speak a phrase then a word — queued so they play back-to-back */
function speakThenWord(phrase, word){
  if(!voiceEnabled) return;
  try{
    speechSynthesis.cancel();
    _ready();
    speechSynthesis.speak(_utt(phrase, 0.88, 1.08));
    speechSynthesis.speak(_utt(word,   0.72, 1.05));
  }catch(e){}
}

function speakPrompt(item){
  if(!voiceEnabled) return;
  if(catKey === 'letters'){
    speakOnly(`What letter does the word ${item.sub} start with?`, 0.84);
  } else if(catKey === 'lowercase'){
    speakThenWord('Pop the lowercase letter', item.word);
  } else if(catKey === 'sight'){
    speakThenWord('Find this word', item.word);
  } else if(catKey === 'longvowels'){
    speakThenWord('Pop the long vowel word', item.word);
  } else if(catKey === 'rcontrolled'){
    speakThenWord('Pop the bossy R word', item.word);
  } else {
    speakThenWord('Pop the word', item.word);
  }
}

function toggleSpeaker(){
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('speakerBtn');
  btn.innerHTML = voiceEnabled ? '&#128266;' : '&#128263;';
  btn.classList.toggle('muted', !voiceEnabled);
  if(!voiceEnabled) speechSynthesis.cancel();
}

/* ═══════════════════════ AUDIO (beeps) ═══════════════════════ */
const ACtx = window.AudioContext || window.webkitAudioContext;
let ac = null;
function ensureAC(){ if(!ac && ACtx){ try{ ac=new ACtx(); }catch(e){} } }
function beep(freq,dur,type='sine',vol=.28){
  if(!ac) return;
  try{
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sndCorrect(){ beep(660,.07); setTimeout(()=>beep(880,.11),70); setTimeout(()=>beep(1100,.14),150); }
function sndWrong()  { beep(180,.25,'sawtooth',.2); }

/* ═══════════════════════ INIT ═══════════════════════ */
(function init(){
  const bar    = document.getElementById('catBar');
  const keys   = ['letters','lowercase','sight','cvc','longvowels','irregular','digraphs','rcontrolled'];
  const labels = ['🔤 Letter Sounds','🔡 Letters','👁️ Sight Words','📝 Word Families','🗣️ Long Vowels','🌊 Irregular','🌸 Digraphs','⭐ R-Controlled'];
  keys.forEach((k,i)=>{
    const b = document.createElement('button');
    b.className = 'btn-cat'; b.textContent = labels[i];
    b.onclick = ()=>{ ensureAC(); selectCat(k); };
    bar.appendChild(b);
  });
  const p = new URLSearchParams(location.search);
  selectCat(CATS[p.get('cat')] ? p.get('cat') : 'letters');
})();

function selectCat(key){
  catKey = key;
  const c = CATS[key];
  document.documentElement.style.setProperty('--accent', c.accent);
  document.querySelector('header').style.background = c.accent;
  document.getElementById('gameField').style.background = 'transparent';
  document.querySelectorAll('.btn-cat').forEach((b,i)=>{
    b.classList.toggle('active',
      ['letters','lowercase','sight','cvc','longvowels','irregular','digraphs','rcontrolled'][i]===key);
  });
  document.getElementById('pageTitle').textContent = c.title;
  stopGame();
  showOverlay(false);
}

/* ═══════════════════════ OVERLAY ═══════════════════════ */
function showOverlay(isEnd){
  const c  = CATS[catKey];
  if(!isEnd){
    document.getElementById('ovTitle').textContent = `${c.emoji} ${c.title}`;
    document.getElementById('ovMsg').textContent   = 'Pop the right bubbles — 3 lives!';
    document.getElementById('finalScore').style.display = 'none';
    document.getElementById('btnPlay').textContent = 'Start Game!';
  } else {
    document.getElementById('ovTitle').textContent = lives<=0 ? '💔 Game Over!' : '🎉 Amazing!';
    document.getElementById('ovMsg').textContent   = lives<=0 ? 'Better luck next time!' : 'You popped them all!';
    const fs = document.getElementById('finalScore');
    fs.style.display = 'block';
    fs.textContent   = `⭐ ${score} points`;
    document.getElementById('btnPlay').textContent = 'Play Again!';
  }
  document.getElementById('overlay').style.display = 'flex';
}

/* ═══════════════════════ GAME CONTROL ═══════════════════════ */
function startGame(){
  ensureAC();
  score=0; lives=3; bubbles=[]; bId=0; target=null;
  document.getElementById('scoreEl').textContent = '0';
  updateLives();
  document.getElementById('promptArea').style.display = 'flex';
  document.getElementById('livesBar').style.display   = 'block';
  document.getElementById('overlay').style.display    = 'none';
  document.querySelectorAll('.bubble').forEach(b=>b.remove());

  nextTarget();
  for(let i=0;i<MAX_B-1;i++) setTimeout(()=>spawnDistractor(), i*180);

  running = true;
  if(animId) cancelAnimationFrame(animId);
  loop();
}

function stopGame(){
  running = false;
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  document.querySelectorAll('.bubble').forEach(b=>b.remove());
  bubbles = [];
  document.getElementById('promptArea').style.display = 'none';
  document.getElementById('livesBar').style.display   = 'none';
}

function endGame(){
  running = false;
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  setTimeout(()=>showOverlay(true), 400);
}

/* ═══════════════════════ TARGET & BUBBLES ═══════════════════════ */
function getUnused(exclude){
  const used = new Set(bubbles.map(b=>b.item.word));
  if(exclude) used.add(exclude);
  const pool = CATS[catKey].items.filter(it=>!used.has(it.word));
  return pool.length ? pool[Math.floor(Math.random()*pool.length)]
                     : CATS[catKey].items[Math.floor(Math.random()*CATS[catKey].items.length)];
}

function nextTarget(){
  const item = getUnused(target ? target.word : null);
  target = item;
  updatePrompt(item);
  spawnBubble(item, true);
}

function spawnDistractor(){
  if(!running) return;
  const item = getUnused(target ? target.word : null);
  spawnBubble(item, false);
}

function spawnBubble(item, isTarget){
  const field = document.getElementById('gameField');
  const fw    = field.clientWidth;
  const fh    = field.clientHeight;
  const wlen  = item.word.length;
  const size  = wlen===1 ? 72 : wlen<=3 ? 76 : wlen<=5 ? 82 : 88;
  const fz    = wlen===1 ? 26 : wlen<=3 ? 20 : wlen<=5 ? 16 : 12;
  const x     = Math.random()*(fw-size-12)+6;
  const speed = .5 + Math.random()*.6;
  const bubbleImg = BUBBLE_IMGS[Math.floor(Math.random()*BUBBLE_IMGS.length)];

  const el = document.createElement('div');
  el.className = 'bubble';
  el.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${fh+size+10}px;background-image:url('${bubbleImg}');font-size:${fz}px;`;

  const sp = document.createElement('span');
  sp.className = 'b-word'; sp.textContent = item.word;
  el.appendChild(sp);

  const id  = bId++;
  el.dataset.id = id;
  const obj = { id, item, el, x, y:fh+size+10, speed, size, isTarget, popping:false };

  el.addEventListener('pointerdown', e=>{ e.preventDefault(); onPop(obj); });
  bubbles.push(obj);
  field.appendChild(el);
}

function removeBubble(obj){
  const i = bubbles.indexOf(obj);
  if(i>=0) bubbles.splice(i,1);
  obj.el.remove();
}

/* ═══════════════════════ POP HANDLER ═══════════════════════ */
function onPop(obj){
  if(obj.popping || !running) return;
  obj.popping = true;
  ensureAC();

  if(obj.isTarget){
    score += 10;
    document.getElementById('scoreEl').textContent = score;
    sndCorrect();
    obj.el.classList.add('pop-ok');
    spawnBurst(obj);
    spawnSparkles(obj);
    setTimeout(()=>{
      removeBubble(obj);
      if(!running) return;
      spawnDistractor();
      nextTarget();
    }, 320);
  } else {
    sndWrong();
    lives--;
    updateLives();
    obj.el.classList.add('pop-no');
    setTimeout(()=>{
      if(obj.el.parentNode){ obj.el.classList.remove('pop-no'); obj.popping=false; }
    }, 380);
    if(lives<=0) endGame();
  }
}

/* ═══════════════════════ GAME LOOP ═══════════════════════ */
function loop(){
  if(!running){ animId=null; return; }
  for(let i=bubbles.length-1;i>=0;i--){
    const b = bubbles[i];
    if(b.popping && b.isTarget) continue;
    b.y -= b.speed;
    b.el.style.top = b.y+'px';
    if(b.y + b.size < -5){
      const wasT = b.isTarget;
      removeBubble(b);
      if(wasT){ spawnDistractor(); nextTarget(); }
      else      spawnDistractor();
    }
  }
  animId = requestAnimationFrame(loop);
}

/* ═══════════════════════ PROMPT ═══════════════════════ */
function updatePrompt(item){
  const c    = CATS[catKey];
  const pic  = document.getElementById('promptPic');
  const sub  = document.getElementById('promptSub');
  const hint = document.getElementById('promptHint');

  // Update hint text
  if(catKey === 'letters'){
    hint.textContent = 'What letter does it start with?';
  } else if(catKey === 'lowercase'){
    hint.textContent = 'Pop the lowercase letter:';
  } else if(catKey === 'sight'){
    hint.textContent = 'Find this word:';
  } else if(catKey === 'longvowels'){
    hint.textContent = 'Pop the long vowel word:';
  } else if(catKey === 'rcontrolled'){
    hint.textContent = 'Pop the bossy R word:';
  } else {
    hint.textContent = 'Pop the word:';
  }

  // Update picture + sub label
  if(c.promptType === 'word'){
    pic.className   = 'prompt-pic word';
    pic.textContent = item.show;
    sub.textContent = '';
  } else {
    pic.className   = 'prompt-pic';
    if(PIC_OVERRIDES[item.word]){
      pic.innerHTML = PIC_OVERRIDES[item.word];
    } else if(item.show.includes('/')){
      pic.innerHTML = `<img src="${item.show}" alt="${item.sub}" style="width:3.5rem;height:3.5rem;object-fit:contain;border-radius:8px">`;
    } else {
      pic.textContent = item.show;
    }
    sub.textContent = item.sub ? item.sub : '';
  }

  // Speak the prompt
  speakPrompt(item);
}

/* ═══════════════════════ LIVES ═══════════════════════ */
function updateLives(){
  document.getElementById('livesBar').textContent =
    '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}

/* ═══════════════════════ EFFECTS ═══════════════════════ */
function spawnBurst(obj){
  const field = document.getElementById('gameField');
  const cx = obj.x + obj.size/2;
  const cy = obj.y + obj.size/2;
  const el = document.createElement('div');
  el.className = 'score-burst';
  el.style.cssText = `left:${cx-18}px;top:${cy-12}px;`;
  el.textContent = '+10';
  field.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

function spawnSparkles(obj){
  const field  = document.getElementById('gameField');
  const cx     = obj.x + obj.size/2;
  const cy     = obj.y + obj.size/2;
  const emojis = ['✨','⭐','💛','🌟','💥','🎉'];
  for(let i=0;i<7;i++){
    const sp  = document.createElement('div');
    sp.className = 'sparkle';
    const ang = (i/7)*Math.PI*2 + Math.random()*.4;
    const d   = 36 + Math.random()*28;
    sp.style.cssText = `left:${cx}px;top:${cy}px;--dx:${Math.cos(ang)*d}px;--dy:${Math.sin(ang)*d}px;`;
    sp.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    field.appendChild(sp);
    setTimeout(()=>sp.remove(), 700);
  }
}
</script>
