<script>
/* ── SPEECH ── */
let _muted = false, _speaking = false, _pending = null, _queue = [], _voice = null;
function _launch(msg) {
  if (_muted) return;
  window.speechSynthesis.cancel();
  _queue = msg.split(' | '); _speaking = false; _advance();
}
function _advance() {
  if (!_queue.length) { _speaking=false; if(_pending){const t=_pending;_pending=null;_launch(t);} return; }
  _speaking = true;
  const utt = new SpeechSynthesisUtterance(_queue.shift());
  if (_voice) utt.voice = _voice;
  utt.rate = 0.92; utt.pitch = 1.0;
  utt.onend = () => { _speaking=false; setTimeout(_advance,350); };
  window.speechSynthesis.speak(utt);
}
function speak(msg) { if(_muted)return; if(_speaking){_pending=msg;}else{_launch(msg);} }
function loadVoices() {
  const all = window.speechSynthesis.getVoices();
  if (!all.length) return;
  _voice = all.find(v => v.name.includes('Natural') && /^en/i.test(v.lang))
          || all.find(v => /aria|jenny|guy\b|ana\b|davis/i.test(v.name))
          || all.find(v => /google.*english/i.test(v.name))
          || all.find(v => /\bdavid\b|\bzira\b/i.test(v.name))
          || all.find(v => v.lang && /^en/i.test(v.lang))
          || all[0];
}
window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices();
document.getElementById('btnMute').addEventListener('click', () => {
  _muted = !_muted;
  document.getElementById('btnMute').textContent = _muted ? '🔇' : '🔊';
  document.getElementById('btnMute').classList.toggle('muted', _muted);
  if (_muted) window.speechSynthesis.cancel();
});
document.getElementById('btnVoice').addEventListener('click', () => {
  const voices = window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.startsWith('en'));
  if (!voices.length) return;
  const idx = voices.indexOf(_voice);
  _voice = voices[(idx+1) % voices.length];
  speak(`Hello! My name is ${_voice.name.split(' ')[0]}!`);
});

/* ── GAME STATE ── */
let currentCat = 'Digraphs';
let questions = [], qIdx = 0, score = 0, locked = false;

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function getChoices(correct, allPatterns, wrongPool) {
  const others = allPatterns.filter(p => p !== correct);
  shuffle(others);
  const extra = shuffle([...wrongPool]);
  const choices = [correct];
  others.forEach(p => { if (choices.length < 4) choices.push(p); });
  extra.forEach(p => { if (choices.length < 4 && !choices.includes(p)) choices.push(p); });
  return shuffle(choices);
}

function startGame(cat) {
  currentCat = cat;
  questions = shuffle([...BLEND_DATA[cat].words]);
  qIdx = 0; score = 0;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('qTotal').textContent = questions.length;
  document.querySelectorAll('.btn-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  showQuestion();
}

function buildWordDisplay(q, revealed) {
  const el = document.getElementById('wordShow');
  el.innerHTML = '';
  if (q.start) {
    const s = document.createElement('span'); s.className = 'word-part'; s.textContent = q.start; el.appendChild(s);
  }
  const blank = document.createElement('span');
  blank.className = 'word-blank-box' + (revealed ? ' filled' : '');
  blank.textContent = revealed ? q.pattern : '?';
  el.appendChild(blank);
  if (q.end) {
    const e = document.createElement('span'); e.className = 'word-part'; e.textContent = q.end; el.appendChild(e);
  }
}

function showQuestion() {
  locked = false;
  const q = questions[qIdx];
  const data = BLEND_DATA[currentCat];
  const ed = document.getElementById('emojiDisplay');
  if (q.img) { ed.innerHTML = q.img; } else { ed.textContent = q.emoji; }
  buildWordDisplay(q, false);
  document.getElementById('patternHint').textContent = data.hint;
  document.getElementById('qNum').textContent = qIdx + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('progressFill').style.width = (qIdx / questions.length * 100) + '%';

  const choices = getChoices(q.pattern, data.allPatterns, data.wrongPool);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach(pat => {
    const btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.textContent = pat;
    btn.addEventListener('click', () => checkAnswer(pat, btn));
    choicesEl.appendChild(btn);
  });
  speak(`What letters go in the blank to make the word ${q.word}?`);
}

function checkAnswer(pat, btn) {
  if (locked) return;
  const q = questions[qIdx];
  if (pat === q.pattern) {
    locked = true;
    btn.classList.add('correct');
    document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
    buildWordDisplay(q, true);
    document.getElementById('feedback').textContent = q.word.toUpperCase() + '! Great job! 🎉';
    document.getElementById('feedback').className = 'feedback ok';
    score++;
    document.getElementById('scoreVal').textContent = score;
    const blendPos = q.start === '' ? 'starts with' : 'ends with';
    speak(`${q.word}! | Great job! | ${q.word} ${blendPos} the ${q.pattern} blend!`);
    setTimeout(advance, 1700);
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = 'Try again!';
    document.getElementById('feedback').className = 'feedback err';
    speak('Try again!');
    setTimeout(() => {
      btn.classList.remove('wrong');
      btn.disabled = true;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
    }, 900);
  }
}

function advance() {
  qIdx++;
  if (qIdx >= questions.length) { showGameOver(); } else { showQuestion(); }
}

function showGameOver() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('emojiDisplay').textContent = '🎉';
  document.getElementById('wordShow').innerHTML = '';
  document.getElementById('patternHint').textContent = 'Game Over!';
  document.getElementById('feedback').textContent = `You got ${score} of ${questions.length}! Amazing!`;
  document.getElementById('feedback').className = 'feedback ok';
  const btn = document.createElement('button');
  btn.className = 'btn-choice';
  btn.style.cssText = 'grid-column:1/-1;font-family: 'Comic Sans MS', 'Comic Neue', cursive;font-size:1.1rem;';
  btn.textContent = 'Play Again! 🔄';
  btn.addEventListener('click', () => startGame(currentCat));
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choicesEl.appendChild(btn);
  speak(`Amazing! You got ${score} out of ${questions.length} words correct!`);
}

document.querySelectorAll('.btn-cat').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.cat));
});
startGame('Digraphs');
