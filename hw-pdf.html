<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Comic Sans MS","Comic Sans",cursive;background:#fff;color:#000}

/* ── Page shell ── */
.page{
  width:8.5in;
  min-height:11in;
  padding:.55in .72in;
  position:relative;
  page-break-after:always;
}
.page:last-child{page-break-after:auto}

/* ── Page 1 header ── */
.hw-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:3px solid #90caf9}
.hw-em{font-size:2.4rem;line-height:1;flex-shrink:0}
.hw-title{font-size:16pt;font-weight:900;line-height:1.15}
.hw-sub{font-size:9pt;color:#555;margin-top:3px}

/* ── Name / Date ── */
.name-row{display:flex;gap:40px;margin-bottom:14px}
.name-box{flex:1}
.name-box label{font-size:8pt;color:#777;display:block;margin-bottom:2px}
.name-box .line{border-bottom:2px solid #444;height:18px}

/* ── Story ── */
.story-box{border:2.5px solid #81c784;border-radius:10px;padding:10px 14px;margin-bottom:13px;background:#f9fff9}
.sec-title{font-size:10.5pt;font-weight:900;margin-bottom:7px}
.story-box .sec-title{color:#2e7d32}
.story-p{font-size:11pt;line-height:1.62;margin-bottom:2px}

/* ── Comprehension ── */
.comp-box{margin-bottom:12px}
.comp-box .sec-title{color:#e65100}
.q-wrap{margin-bottom:11px}
.q-text{font-size:10.5pt;font-weight:700;line-height:1.5;margin-bottom:6px}
.blank{display:inline-block;width:84px;border-bottom:2.5px solid #000;vertical-align:bottom}
.choices{display:flex;gap:14px;padding-left:8px}
.choice{border:2.5px solid #999;border-radius:28px;padding:4px 18px;font-size:11pt;font-weight:900;color:#1a1a2e;background:#fafafa;min-width:74px;text-align:center}

/* ── Find It ── */
.find-box{border:2.5px solid #ffb74d;border-radius:10px;padding:9px 14px;background:#fffde7}
.find-box .sec-title{color:#bf360c;margin-bottom:6px}
.find-key-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:8px;font-size:8.5pt;font-weight:700;color:#555}
.fkw{border:2px solid #bf360c;border-radius:12px;padding:2px 8px;font-size:8.5pt;font-weight:900;background:#fff8e1;color:#bf360c}
.word-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0 auto}
.wbub{border:2.5px solid #bbb;border-radius:22px;padding:4px 16px;font-size:10.5pt;font-weight:900;text-align:center;font-family:"Comic Sans MS",cursive;min-width:62px;background:#fff}

/* ── WF Find It ── */
.find-wf-box{border:2.5px solid #a5d6a7;border-radius:10px;padding:9px 14px;margin-top:10px;background:#f1fff4}
.find-wf-box .sec-title{color:#1b5e20;margin-bottom:6px}
.fkwf{border:2px solid #2e7d32;border-radius:12px;padding:2px 8px;font-size:8.5pt;font-weight:900;background:#e8f5e9;color:#2e7d32}

/* ── Flashcard page ── */
.fc-page-inner{max-width:7in;margin:0 auto}
.fc-pg-hdr{text-align:center;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #ddd}
.fc-pg-hdr h1{font-size:17pt;margin-bottom:4px}
.fc-pg-hdr .fc-story{font-size:10pt;color:#555}
.fc-pg-hdr .fc-tip{font-size:8.5pt;color:#aaa;margin-top:3px}
.fc-sec-lbl{font-size:10.5pt;font-weight:800;margin:12px 0 5px 0;text-align:left}
.sw-lbl{color:#1565c0}
.wf-lbl{color:#2e7d32}
.fc-table{width:100%;border-collapse:collapse;border:none;table-layout:fixed}
.fc-table td{width:33.33%;padding:0;border:none;vertical-align:top}
.fc-card{margin:4px;border:2.5px dashed;border-radius:10px;padding:14px 6px 10px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fc-type{font-size:6.5pt;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.fc-word{font-size:20pt;font-weight:900}
.sw-fc{border-color:#1976d2;background:#f0f4ff}
.sw-fc .fc-type{color:#1976d2}
.wf-fc{border-color:#388e3c;background:#f0fff4}
.wf-fc .fc-type{color:#388e3c}
.cut-line{border-top:1.5px dashed #ccc;margin:0 4px;text-align:right}
.cut-icon{font-size:9pt;color:#ccc;padding-right:6px}

/* ── Print button ── */
.print-bar{position:fixed;bottom:24px;right:24px;z-index:100}
.print-btn{font-family:"Comic Sans MS",cursive;font-size:13pt;font-weight:700;padding:11px 26px;border-radius:30px;background:#1a237e;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.24)}
.print-btn:hover{background:#283593}

/* ── Back button ── */
.back-bar{position:fixed;top:16px;left:16px;z-index:100}
.back-btn{font-family:"Comic Sans MS",cursive;font-size:12pt;font-weight:700;padding:9px 20px;border-radius:30px;background:#6B48FF;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.24);text-decoration:none;display:inline-block}
.back-btn:hover{background:#5a3de0}

@page{size:8.5in 11in;margin:0}
@media print{
  .page{page-break-after:always}
  .print-bar{display:none}
  .back-bar{display:none}
}
</style>
</head>

/* ── Shuffle ── */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ── Flashcard table builder ── */
function makeCards(words, cls, typeLbl) {
  var padded = words.slice();
  while (padded.length % 3 !== 0) padded.push('');
  var rows = '';
  for (var i = 0; i < padded.length; i += 3) {
    if (i > 0) {
      rows += '<tr><td colspan="3"><div class="cut-line"><span class="cut-icon">&#9986;</span></div></td></tr>';
    }
    var cells = '';
    for (var j = 0; j < 3; j++) {
      var w = padded[i + j];
      cells += w
        ? '<td><div class="fc-card ' + cls + '"><span class="fc-type">' + typeLbl + '</span><span class="fc-word">' + w + '</span></div></td>'
        : '<td></td>';
    }
    rows += '<tr>' + cells + '</tr>';
  }
  return '<table class="fc-table">' + rows + '</table>';
}

/* ── Find-It grid builder ── */
var DISTRACTORS = ['bat','cat','cup','dog','fun','hat','hot','log','map','nap',
                   'pan','pet','rat','run','sit','top','wig','red','big','hop',
                   'set','fox','mud','jog','rim','get','put','him','her','she'];

function makeFindGrid(swWords) {
  var dist = DISTRACTORS.filter(function(x){ return swWords.indexOf(x) < 0; });
  var need = Math.max(0, 15 - swWords.length);
  var pool = shuffle(swWords.concat(shuffle(dist).slice(0, need)));

  var keyBubs = swWords.map(function(w){
    return '<span class="fkw">' + w + '</span>';
  }).join('');

  var bubbles = pool.map(function(w){
    return '<div class="wbub">' + w + '</div>';
  }).join('');

  return '<div class="find-box">' +
    '<div class="sec-title">&#128269; Find It! &mdash; Circle the Sight Words</div>' +
    '<div class="find-key-row"><strong>Words to find:&nbsp;</strong>' + keyBubs + '</div>' +
    '<div class="word-grid">' + bubbles + '</div>' +
  '</div>';
}

/* ── WF Find-It grid builder ── */
var WF_DISTRACTORS2 = ['bat','can','bed','big','dog','bug','ate','bee','boat','vote',
  'mule','bay','ring','kite','fry','boo','food','moon','pool','crown',
  'snake','bird','milk','golf','sick','help','back','dark','best','kind'];

function makeFindGridWF(wfWords) {
  var dist = WF_DISTRACTORS2.filter(function(x){ return wfWords.indexOf(x) < 0; });
  var need = Math.max(0, 15 - wfWords.length);
  var pool = shuffle(wfWords.concat(shuffle(dist).slice(0, need)));

  var keyBubs = wfWords.map(function(w){
    return '<span class="fkwf">' + w + '</span>';
  }).join('');

  var bubbles = pool.map(function(w){
    return '<div class="wbub">' + w + '</div>';
  }).join('');

  return '<div class="find-wf-box">' +
    '<div class="sec-title">&#x1F7E2; Circle the Word Family Words</div>' +
    '<div class="find-key-row"><strong>Words to find:&nbsp;</strong>' + keyBubs + '</div>' +
    '<div class="word-grid">' + bubbles + '</div>' +
  '</div>';
}

/* ── Main render ── */
function render() {
  var p    = new URLSearchParams(location.search);
  var book = p.get('book') || '1';
  var ch   = p.get('ch')   || '2';
  var key  = book + '-' + ch;
  var d    = CH[key];

    if (!d) {
    var bkKeys = Object.keys(CH).filter(function(k){ return k.split('-')[0] === book; });
    bkKeys.sort(function(a,b){ return parseInt(a.split('-')[1])-parseInt(b.split('-')[1]); });
    if (bkKeys.length) { d = CH[bkKeys[0]]; ch = bkKeys[0].split('-')[1]; key = book+'-'+ch; }
    if (!d) { return; }
  }

  /* Comprehension questions */
  var qHTML = '';
  for (var i = 0; i < d.q.length; i++) {
    var q = d.q[i][0], a = d.q[i][1], b = d.q[i][2];
    var qText = q.replace('_____', '<span class="blank">&nbsp;</span>');
    qHTML += '<div class="q-wrap">' +
      '<div class="q-text">' + (i + 1) + '. ' + qText + '</div>' +
      '<div class="choices">' +
        '<div class="choice">' + a + '</div>' +
        '<div class="choice">' + b + '</div>' +
      '</div>' +
    '</div>';
  }

  /* Flashcard sections */
  var swHTML = (d.sw && d.sw.length)
    ? '<div class="fc-sec-lbl sw-lbl">&#128156; Sight Words</div>' + makeCards(d.sw, 'sw-fc', 'Sight Word')
    : '';
  var wfHTML = (d.w && d.w.length)
    ? '<div class="fc-sec-lbl wf-lbl">&#128218; Word Family</div>' + makeCards(d.w, 'wf-fc', 'Word Family')
    : '';

  /* Find-It sections */
  var findHTML   = (d.sw && d.sw.length) ? makeFindGrid(d.sw)   : '';
  var findWFHTML = (d.w  && d.w.length)  ? makeFindGridWF(d.w)  : '';

  document.getElementById('hw-root').innerHTML =

    /* ── PAGE 1 ── */
    '<div class="page">' +

      /* Header */
      '<div class="hw-hdr">' +
        '<div class="hw-em">' + d.em + '</div>' +
        '<div>' +
          '<div class="hw-title">' + d.t + '</div>' +
          '<div class="hw-sub">' + d.ch + ' &bull; ' + d.bk + '</div>' +
        '</div>' +
      '</div>' +

      /* Name / Date */
      '<div class="name-row">' +
        '<div class="name-box"><label>Name</label><div class="line"></div></div>' +
        '<div class="name-box"><label>Date</label><div class="line"></div></div>' +
      '</div>' +

      /* Story */
      '<div class="story-box">' +
        '<div class="sec-title">&#128218; Read the Story</div>' +
        d.st.map(function(s){ return '<p class="story-p">' + s + '</p>'; }).join('') +
      '</div>' +

      /* Comprehension */
      '<div class="comp-box">' +
        '<div class="sec-title">&#11088; Circle the Correct Answer</div>' +
        qHTML +
      '</div>' +

      /* Find It — sight words, then word family words */
      findHTML +
      findWFHTML +

    '</div>' +

    /* ── PAGE 2: Flashcards ── */
    '<div class="page">' +
      '<div class="fc-page-inner">' +
        '<div class="fc-pg-hdr">' +
          '<h1>&#9986;&#65039; Cut-Out Flashcards</h1>' +
          '<p class="fc-story">' + d.t + ' &bull; ' + d.ch + '</p>' +
          '<p class="fc-tip">Cut out each card along the dashed lines and practice reading every word!</p>' +
        '</div>' +
        swHTML + wfHTML +
      '</div>' +
    '</div>';
}

render();
</script>
