<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initial Sounds</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Comic Sans MS','Comic Neue','Comic Sans',sans-serif;
  background: url('icons/bg-pencils.png') center/cover no-repeat fixed, linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px;
  user-select: none;
  gap: 0;
}
.game-inner {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  gap: 4px;
  padding-bottom: 4px;
}
header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.back-btn {
  background: rgba(255,255,255,0.22);
  border: none; color: white;
  padding: 8px 16px; border-radius: 20px;
  font-size: 1rem; cursor: pointer;
  font-family: inherit; text-decoration: none; display: inline-block;
}
.title { color: white; font-size: 1.3rem; font-weight: bold; }
.mute-btn {
  background: rgba(255,255,255,0.22);
  border: none; color: white;
  width: 42px; height: 42px; border-radius: 50%;
  font-size: 1.2rem; cursor: pointer;
}
.mute-btn.muted { opacity: 0.45; }

/* Score */
.score-bar {
  display: flex; gap: 16px; margin-bottom: 0;
  color: white; font-size: 1rem;
}
.score-item { display: flex; align-items: center; gap: 6px; }
.score-num { font-size: 1.3rem; font-weight: bold; }

/* Picture card */
.picture-card {
  background: white;
  border-radius: 28px;
  width: clamp(120px, 35vw, 180px);
  height: clamp(120px, 35vw, 180px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  margin-bottom: 0;
  transition: transform 0.15s;
  flex-shrink: 0;
}
.picture-card.bounce { animation: bounce 0.4s ease; }
@keyframes bounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.08)} }
.picture-card.shake  { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)} }

.emoji-big { display: flex; justify-content: center; align-items: center; max-width: 100%; }
.emoji-big img { width: clamp(6rem, 28vw, 9rem); height: clamp(6rem, 28vw, 9rem); object-fit: contain; border-radius: 12px; }
.tap-hint {
  color: rgba(255,255,255,0.75);
  font-size: 0.8rem;
  margin-bottom: 6px;
  min-height: 1.1em;
}

/* Prompt */
.prompt {
  color: white;
  font-size: 1.1rem;
  margin-bottom: 0;
  text-align: center;
  min-height: 1.5em;
}

/* Letter choices */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 340px;
}
.choice-btn {
  font-family: 'Comic Sans MS','Comic Neue','Comic Sans',sans-serif;
  font-size: clamp(2.2rem,9vw,3.5rem);
  color: #333;
  background: white;
  border: 4px solid transparent;
  border-radius: 20px;
  padding: 8px 0;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: transform 0.12s, border-color 0.15s, background 0.15s;
  line-height: 1.1;
}
.choice-btn:hover:not(:disabled) { transform: scale(1.06); border-color: #f5576c; }
.choice-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
.choice-btn.wrong   { background: #f8d7da; border-color: #dc3545; color: #721c24; }
.choice-btn:disabled { cursor: default; }

/* Next btn */
.next-btn {
  margin-top: 6px;
  background: white;
  color: #f5576c;
  border: none;
  padding: 10px 32px;
  border-radius: 30px;
  font-size: 1.1rem;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  display: none;
  transition: transform 0.12s;
}
.next-btn:hover { transform: scale(1.05); }

/* Progress */
.progress-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 4px;
  max-width: 340px;
}
.pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}
.pip.done { background: white; }
.pip.current { background: rgba(255,255,255,0.75); }
</style>
  <link href="fonts.css?v=3" rel="stylesheet">
</head>
<body>

<header>
  <a href="hub.html" class="back-btn">← Back</a>
  <div class="title">Initial Sounds</div>
  <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
</header>

<div class="game-inner">
<div class="score-bar">
  <div class="score-item">✅ <span class="score-num" id="right-count">0</span></div>
  <div class="score-item">❌ <span class="score-num" id="wrong-count">0</span></div>
</div>

<div class="tap-hint" id="tap-hint">🔊 Tap a letter to hear the word!</div>

<div class="picture-card" id="picture-card">
  <div class="emoji-big" id="emoji-display">🍎</div>
</div>

<div class="prompt" id="prompt">What letter does this start with?</div>

<div class="choices" id="choices"></div>

<button class="next-btn" id="next-btn" onclick="loadRound()">Next ➡️</button>

<div class="progress-row" id="progress-row"></div>
</div>

<script>
/* ── WORD BANK ── one per letter, vowels = short vowel sounds ── */
const BANK = {
  a:{w:'apple',    e:'icons/pic-a.png'},
  b:{w:'ball',     e:'icons/pic-b.png'},
  c:{w:'cat',      e:'icons/pic-c.png'},
  d:{w:'dog',      e:'icons/pic-d.png'},
  e:{w:'elephant', e:'icons/pic-e.png'},
  f:{w:'fish',     e:'icons/pic-f.png'},
  g:{w:'goat',     e:'icons/pic-g.png'},
  h:{w:'hat',      e:'icons/pic-h.png'},
  i:{w:'igloo',    e:'icons/pic-i.png'},
  j:{w:'jar',      e:'icons/pic-j.png'},
  k:{w:'kite',     e:'icons/pic-k.png'},
  l:{w:'lamp',     e:'icons/pic-l.png'},
  m:{w:'mug',      e:'icons/pic-m.png'},
  n:{w:'nest',     e:'icons/pic-n.png'},
  o:{w:'octopus',  e:'icons/pic-o.png'},
  p:{w:'pig',      e:'icons/pic-p.png'},
  q:{w:'queen',    e:'icons/pic-q.png'},
  r:{w:'rainbow',  e:'icons/pic-r.png'},
  s:{w:'sun',      e:'icons/pic-s.png'},
  t:{w:'tree',     e:'icons/pic-t.png'},
  u:{w:'umbrella', e:'icons/pic-u.png'},
  v:{w:'violin',   e:'icons/pic-v.png'},
  w:{w:'watch',    e:'icons/pic-w.png'},
  x:{w:'xylophone',e:'icons/pic-x.png'},
  y:{w:'yo-yo',    e:'icons/pic-y.png'},
  z:{w:'zebra',    e:'icons/pic-z.png'},
};
const ALL_LETTERS = Object.keys(BANK);

/* State */
let queue = [], done = 0, rightCount = 0, wrongCount = 0;
let currentLetter = '', answered = false;
let voices = [], userInteracted = false, pendingSpeech = null;
let muted = false;

/* Speech */
function loadVoices() { voices = speechSynthesis.getVoices(); }
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function getBestVoice(){const en=voices.filter(v=>/^en/i.test(v.lang));return en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\bjenny\b|\bemma\b/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\bsamantha\b|\bkaren\b|\bmoira\b|\bserena\b|\bvictoria\b/i.test(v.name))||en.find(v=>/natural|online|neural/i.test(v.name))||en.find(v=>/google.*english/i.test(v.name))||en[0]||voices[0];}
function speak(txt, delay = 130) {
  if (!window.speechSynthesis || muted) return;
  if (!userInteracted) { pendingSpeech = txt; return; }
  speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(txt);
    u.rate = 0.82; u.pitch = 1.0; u.volume = 1.0;
    const v = getBestVoice(); if (v) u.voice = v;
    speechSynthesis.speak(u);
  }, delay);
}
function onInteract() {
  if (userInteracted) return;
  userInteracted = true;
  document.getElementById('tap-hint').style.display = 'none';
  if (pendingSpeech && !muted) { const t = pendingSpeech; pendingSpeech = null; speak(t); }
}
function toggleMute() {
  muted = !muted;
  const b = document.getElementById('mute-btn');
  b.textContent = muted ? '🔇' : '🔊';
  b.classList.toggle('muted', muted);
  if (muted) { speechSynthesis.cancel(); return; }
  onInteract();
  if (pendingSpeech) { const t = pendingSpeech; pendingSpeech = null; speak(t); }
}

/* Shuffle */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* Progress pips */
function buildPips() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  for (let i = 0; i < 26; i++) {
    const p = document.createElement('div');
    p.className = 'pip' + (i === 0 ? ' current' : '');
    p.id = 'pip-' + i;
    row.appendChild(p);
  }
}
function updatePips() {
  for (let i = 0; i < 26; i++) {
    const p = document.getElementById('pip-' + i);
    if (!p) continue;
    p.className = 'pip' + (i < done ? ' done' : i === done ? ' current' : '');
  }
}

/* Round */
function loadRound() {
  onInteract();
  if (!queue.length) queue = shuffle([...ALL_LETTERS]);
  currentLetter = queue.pop();
  answered = false;

  const entry = BANK[currentLetter];
  const emojiEl = document.getElementById('emoji-display');
  emojiEl.innerHTML = `<img src="${entry.e}" alt="${entry.w}">`;
  document.getElementById('prompt').textContent = 'What letter does this start with?';
  document.getElementById('next-btn').style.display = 'none';

  const card = document.getElementById('picture-card');
  card.classList.remove('bounce','shake');
  void card.offsetWidth;
  card.classList.add('bounce');

  // Build 4 choices: correct + 3 random wrong
  const wrong = shuffle(ALL_LETTERS.filter(l => l !== currentLetter)).slice(0, 3);
  const options = shuffle([currentLetter, ...wrong]);

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = letter;
    btn.onclick = () => { onInteract(); handleAnswer(btn, letter); };
    choicesEl.appendChild(btn);
  });

  updatePips();
  speak(entry.w);
}

function handleAnswer(btn, letter) {
  if (answered) return;
  answered = true;

  const entry = BANK[currentLetter];
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const card = document.getElementById('picture-card');
  card.classList.remove('bounce','shake');
  void card.offsetWidth;

  if (letter === currentLetter) {
    btn.classList.add('correct');
    card.classList.add('bounce');
    rightCount++;
    document.getElementById('right-count').textContent = rightCount;
    document.getElementById('prompt').textContent = '🎉 Yes! ' + entry.w.charAt(0).toUpperCase() + entry.w.slice(1) + ' starts with ' + currentLetter + '!';
    speak('Yes! ' + entry.w + ' starts with ' + currentLetter + '!');
  } else {
    btn.classList.add('wrong');
    card.classList.add('shake');
    // Highlight correct
    allBtns.forEach(b => { if (b.textContent === currentLetter) b.classList.add('correct'); });
    wrongCount++;
    document.getElementById('wrong-count').textContent = wrongCount;
    document.getElementById('prompt').textContent = entry.w.charAt(0).toUpperCase() + entry.w.slice(1) + ' starts with ' + currentLetter + '!';
    speak(entry.w + ' starts with ' + currentLetter + '.');
  }

  done++;
  if (done >= 26) done = 0;
  document.getElementById('next-btn').style.display = 'block';
}

buildPips();
loadRound();
</script>
  <script src="site-nav.js?v=4"></script>
</body>
</html>
