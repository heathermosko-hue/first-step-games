<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Flashcards</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Comic Sans MS','Comic Neue','Comic Sans';
  background: url('icons/bg-default.png') center/cover no-repeat fixed, linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100dvh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 16px 16px;
  user-select: none;
}
header {
  width: 100%;
  max-width: 420px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.back-btn {
  background: rgba(255,255,255,0.22);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 1rem;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: inline-block;
}
.title { color: white; font-size: 1.3rem; font-weight: bold; }
.mute-btn {
  background: rgba(255,255,255,0.22);
  border: none;
  color: white;
  width: 42px; height: 42px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
}
.mute-btn.muted { opacity: 0.45; }

/* ── Mode tabs ── */
.mode-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  width: 100%;
  max-width: 380px;
  flex-shrink: 0;
}
.mode-tab {
  flex: 1;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.85);
  padding: 8px 4px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  line-height: 1.2;
}
.mode-tab.active {
  background: white;
  color: #764ba2;
  border-color: white;
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
}
.mode-tab:hover:not(.active) { background: rgba(255,255,255,0.3); }

/* ── Card ── */
.card-scene {
  width: min(300px, 85vw);
  height: min(360px, calc(100dvh - 270px));
  min-height: 180px;
  cursor: pointer;
  margin: 0 0 12px;
  flex-shrink: 0;
}
.card {
  width: 100%; height: 100%;
  position: relative;
  border-radius: 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  transition: background 0.35s, transform 0.12s;
}
.card:active { transform: scale(0.97); }
.card.upper-mode { background: linear-gradient(135deg, #FF6B6B, #FF8E53); }
.card.lower-mode { background: linear-gradient(135deg, #667eea, #9b59b6); }
.card.sound-mode { background: linear-gradient(135deg, #4ECDC4, #44CF6C); }

.case-label {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-align: center;
  padding: 0 12px;
}
.letter-big {
  font-family: 'Comic Sans MS','Comic Neue','Comic Sans';
  font-size: clamp(5rem, 22vw, 11rem);
  color: white;
  line-height: 1;
  text-shadow: 3px 5px 0 rgba(0,0,0,0.18);
}
.tap-hint {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.65);
  margin-top: 16px;
}
#letter-pic {
  width: 88%; height: 88%;
  object-fit: contain;
  border-radius: 16px;
}

/* Nav */
.nav-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.nav-btn {
  background: rgba(255,255,255,0.25);
  border: none;
  color: white;
  width: 48px; height: 48px;
  border-radius: 50%;
  font-size: 1.3rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
}
.nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.4); transform: scale(1.07); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.counter { color: white; font-size: 1rem; min-width: 56px; text-align: center; }

/* Alphabet dots */
.dots-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
  max-width: 340px;
  flex-shrink: 0;
}
.dot {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: background 0.15s;
}
.dot.active { background: white; color: #764ba2; font-weight: bold; }
.dot:hover  { background: rgba(255,255,255,0.4); }

@media(max-width:600px) {
  .card-scene {
    height: min(240px, 38dvh);
    min-height: 160px;
    width: min(260px, 80vw);
    margin-bottom: 8px;
  }
  .letter-big { font-size: clamp(4.5rem, 28vw, 7rem); }
  .mode-tab { padding: 6px 2px; font-size: 0.7rem; }
  .nav-row { gap: 10px; margin-bottom: 4px; }
  .dots-row { gap: 3px; max-width: 300px; }
  .dot { width: 22px; height: 22px; font-size: 0.62rem; }
}
</style>
<link href="fonts.css?v=3" rel="stylesheet">
<script src="tts.js?v=12"></script>
</head>
<body>

<header>
  <a href="hub.html" class="back-btn">← Back</a>
  <div class="title">Letter Flashcards</div>
  <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
</header>

<!-- Mode selector: 3 tabs -->
<div class="mode-tabs">
  <button class="mode-tab active" id="tab-upper" onclick="setMode('upper')">🔠 Uppercase</button>
  <button class="mode-tab" id="tab-lower" onclick="setMode('lower')">🔡 Lowercase</button>
  <button class="mode-tab" id="tab-sound" onclick="setMode('sound')">🔤 Letter/Sound</button>
</div>

<!-- Card (single-face, content changes per mode) -->
<div class="card-scene" onclick="cardTap()">
  <div class="card upper-mode" id="card">
    <div class="case-label" id="card-label">Uppercase</div>
    <div class="letter-big" id="card-letter">A</div>
    <img id="letter-pic" src="icons/letter-a.png" alt="A is for Apple" style="display:none">
    <div class="tap-hint">Tap to hear</div>
  </div>
</div>

<!-- Navigation -->
<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>◀</button>
  <div class="counter" id="counter">1 / 26</div>
  <button class="nav-btn" id="next-btn" onclick="go(1)">▶</button>
</div>

<div class="dots-row" id="dots-row"></div>

<script>
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const LETTER_WORDS = {A:'Apple',B:'Ball',C:'Cat',D:'Dog',E:'Elephant',F:'Fish',G:'Goat',H:'Hat',I:'Igloo',J:'Jar',K:'Kite',L:'Lamp',M:'Mug',N:'Nest',O:'Octopus',P:'Pig',Q:'Queen',R:'Rainbow',S:'Sun',T:'Tree',U:'Umbrella',V:'Violin',W:'Watch',X:'Xylophone',Y:'Yo-yo',Z:'Zebra'};

let cur = 0, mode = 'upper', muted = false;
let voices = [], userInteracted = false, pendingSpeech = null;

/* ── Speech ── */
function loadVoices() { voices = speechSynthesis.getVoices(); }
speechSynthesis.addEventListener('voiceschanged', loadVoices);
loadVoices();

function getBestVoice(){const en=voices.filter(v=>/^en/i.test(v.lang));return en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\b(jenny|emma)\b/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/female/i.test(v.name))||en.find(v=>/\b(samantha|karen|moira|serena|victoria|tessa|fiona|kate|zoe|allison|ava|zira|eva|hazel|susan)\b/i.test(v.name))||en.find(v=>/natural|neural|online/i.test(v.name))||en.find(v=>/google.*english/i.test(v.name))||en[0]||voices[0];}

function speak(txt, delay) {
  if (!window.speechSynthesis || muted) return;
  delay = delay || 130;
  if (!userInteracted) { pendingSpeech = txt; return; }
  speechSynthesis.cancel();
  setTimeout(function() {
    var u = new SpeechSynthesisUtterance(txt);
    u.rate = 0.85; u.pitch = 1.0; u.volume = 1.0;
    var v = getBestVoice(); if (v) u.voice = v;
    speechSynthesis.speak(u);
  }, delay);
}
function onInteract() {
  if (userInteracted) return;
  userInteracted = true;
  if (pendingSpeech && !muted) { var t = pendingSpeech; pendingSpeech = null; speak(t); }
}
function toggleMute() {
  muted = !muted;
  var b = document.getElementById('mute-btn');
  b.textContent = muted ? '🔇' : '🔊';
  b.classList.toggle('muted', muted);
  if (muted) { speechSynthesis.cancel(); return; }
  onInteract();
  if (pendingSpeech) { var t = pendingSpeech; pendingSpeech = null; speak(t); }
}

/* ── Card display ── */
function showLetter() {
  var L = LETTERS[cur];
  var card     = document.getElementById('card');
  var label    = document.getElementById('card-label');
  var letterEl = document.getElementById('card-letter');
  var picEl    = document.getElementById('letter-pic');

  letterEl.style.display = '';
  picEl.style.display = 'none';

  if (mode === 'upper') {
    card.className = 'card upper-mode';
    label.textContent = 'Uppercase';
    letterEl.textContent = L;
    speak('Capital ' + L + '... lowercase ' + L.toLowerCase());
  } else if (mode === 'lower') {
    card.className = 'card lower-mode';
    label.textContent = 'Lowercase';
    letterEl.textContent = L.toLowerCase();
    speak('Lowercase ' + L.toLowerCase());
  } else {
    card.className = 'card sound-mode';
    label.textContent = L + ' is for ' + LETTER_WORDS[L];
    letterEl.style.display = 'none';
    picEl.src = 'icons/letter-' + L.toLowerCase() + '.png';
    picEl.alt = L + ' is for ' + LETTER_WORDS[L];
    picEl.style.display = '';
    speak(L + ' is for ' + LETTER_WORDS[L]);
  }

  document.getElementById('counter').textContent = (cur + 1) + ' / 26';
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === 25;
  updateDots();
}

function cardTap() {
  onInteract();
  var L = LETTERS[cur];
  if (mode === 'upper') speak('Capital ' + L + '... lowercase ' + L.toLowerCase());
  else if (mode === 'lower') speak('Lowercase ' + L.toLowerCase());
  else speak(L + ' is for ' + LETTER_WORDS[L]);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.id === 'tab-' + m);
  });
  showLetter();
}

function go(dir) {
  onInteract();
  cur = Math.max(0, Math.min(25, cur + dir));
  showLetter();
}

/* ── Alphabet dots ── */
function buildDots() {
  var row = document.getElementById('dots-row');
  LETTERS.forEach(function(L, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.textContent = L;
    d.onclick = function(e) { e.stopPropagation(); onInteract(); cur = i; showLetter(); };
    row.appendChild(d);
  });
}
function updateDots() {
  document.querySelectorAll('.dot').forEach(function(d, i) {
    d.classList.toggle('active', i === cur);
  });
}

buildDots();
showLetter();
</script>
<script src="site-nav.js?v=5"></script>
</body>
</html>
