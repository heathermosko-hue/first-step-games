<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Word Pinball | First Step Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link href="fonts.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:#0a0a1a;color:#eee;
         min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

    /* ── HEADER ── */
    header{width:100%;max-width:420px;background:linear-gradient(135deg,#F5A623,#E8960F);
           padding:.75rem 1.2rem;display:flex;align-items:center;gap:.8rem;
           box-shadow:0 3px 14px rgba(245,166,35,.4);}
    .back-link{color:white;text-decoration:none;font-weight:800;font-size:.85rem;
               background:rgba(255,255,255,.22);padding:5px 13px;border-radius:999px;
               white-space:nowrap;transition:background .2s;flex-shrink:0;}
    .back-link:hover{background:rgba(255,255,255,.38);}
    header h1{font-family:'Fredoka One',cursive;color:white;
              font-size:clamp(1.1rem,4vw,1.6rem);flex:1;text-align:center;}
    .btn-mute{background:rgba(255,255,255,.22);border:none;color:white;
              font-size:1.05rem;padding:5px 11px;border-radius:999px;cursor:pointer;
              transition:background .2s;flex-shrink:0;}
    .btn-mute:hover{background:rgba(255,255,255,.38);}
    .btn-mute.muted{background:rgba(255,80,80,.45);}

    /* ── CATEGORY BAR ── */
    .cat-bar{width:100%;max-width:420px;background:#111128;border-bottom:2px solid #2a2a4a;
             padding:.45rem .6rem;display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center;}
    .btn-cat{font-family:'Nunito',sans-serif;font-weight:700;font-size:.75rem;
             border:2px solid #3a3a6a;background:#1a1a3a;color:#8888cc;
             padding:4px 12px;border-radius:999px;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-cat:hover{border-color:#F5A623;color:#F5A623;}
    .btn-cat.active{background:#F5A623;border-color:#F5A623;color:white;}

    /* ── GAME WRAP ── */
    .game-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;
               align-items:center;padding:.5rem .5rem 1.5rem;gap:.5rem;}

    /* ── INFO ROW ── */
    .info-row{width:100%;max-width:380px;display:flex;align-items:center;
              justify-content:space-between;padding:.3rem .4rem;}
    .score-lbl{font-family:'Fredoka One',cursive;font-size:1.25rem;color:#F5A623;}
    .lives-row{display:flex;gap:5px;}
    .life-dot{font-size:1.4rem;transition:opacity .3s;}
    .life-dot.gone{opacity:.15;}
    .q-counter{font-family:'Fredoka One',cursive;font-size:.9rem;color:#6666aa;}

    /* ── CANVAS ── */
    canvas{display:block;width:100%;max-width:380px;border-radius:12px;
           box-shadow:0 0 32px rgba(245,166,35,.12),0 8px 28px rgba(0,0,0,.6);}

    /* ── QUESTION DISPLAY ── */
    .q-display{width:100%;max-width:380px;background:#16163a;border-radius:14px;
               border:2px solid #2a2a5a;padding:.7rem 1rem;
               display:flex;flex-direction:column;align-items:center;gap:.25rem;
               min-height:90px;justify-content:center;}
    .q-display.hidden{display:none;}
    .q-pic{font-size:3.2rem;line-height:1.1;}
    .q-pic.letter-pic{font-family:'Fredoka One',cursive;font-size:4rem;
                      color:#F5A623;line-height:1;}
    .q-label{font-size:.85rem;font-weight:800;color:#8888bb;text-transform:uppercase;
             letter-spacing:.8px;}

    /* ── PADDLES GRID ── */
    .paddles-grid{width:100%;max-width:380px;display:grid;
                  grid-template-columns:1fr 1fr;gap:8px;min-height:120px;}
    .paddles-grid.hidden{display:none;}
    .paddle-btn{font-family:'Fredoka One',cursive;border:none;border-radius:14px;
                padding:18px 10px;cursor:pointer;transition:transform .12s,box-shadow .12s;
                min-height:64px;user-select:none;-webkit-user-select:none;
                color:white;font-size:clamp(1.2rem,4vw,1.7rem);
                display:flex;align-items:center;justify-content:center;text-align:center;}
    .paddle-btn:hover{transform:scale(1.04);}
    .paddle-btn:active{transform:scale(.97);}
    .paddle-btn.c0{background:linear-gradient(135deg,#3A8EF6,#1a6fd8);
                   box-shadow:0 4px 14px rgba(58,142,246,.4);}
    .paddle-btn.c1{background:linear-gradient(135deg,#FF6B6B,#e04444);
                   box-shadow:0 4px 14px rgba(255,107,107,.4);}
    .paddle-btn.c2{background:linear-gradient(135deg,#27AE60,#1d8a4c);
                   box-shadow:0 4px 14px rgba(39,174,96,.4);}
    .paddle-btn.c3{background:linear-gradient(135deg,#B45CFF,#8b2ee8);
                   box-shadow:0 4px 14px rgba(180,92,255,.4);}
    .paddle-btn.flash-correct{animation:correct-pop .45s ease;}
    .paddle-btn.flash-wrong{animation:wrong-shake .35s ease;
                            box-shadow:0 0 0 4px #ff3333, 0 4px 20px rgba(255,51,51,.5) !important;}
    @keyframes correct-pop{0%,100%{transform:scale(1);}50%{transform:scale(1.13);filter:brightness(1.4);}}
    @keyframes wrong-shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-9px);}75%{transform:translateX(9px);}}

    /* ── LAUNCH BUTTON ── */
    .btn-launch{font-family:'Fredoka One',cursive;font-size:1.35rem;
                background:linear-gradient(135deg,#F5A623,#E8960F);color:white;
                border:none;padding:15px 44px;border-radius:999px;cursor:pointer;
                box-shadow:0 5px 18px rgba(245,166,35,.45);
                animation:launch-bounce .9s ease-in-out infinite;
                transition:transform .15s;}
    .btn-launch:hover{animation:none;transform:scale(1.07);}
    @keyframes launch-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
    .hidden{display:none !important;}

    /* ── OVERLAY ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);
             display:flex;align-items:center;justify-content:center;
             z-index:100;padding:1rem;}
    .overlay.hidden{display:none;}
    .ov-box{background:#14143a;border:2px solid #F5A623;border-radius:24px;
            padding:2.2rem 2rem;text-align:center;max-width:340px;width:100%;
            box-shadow:0 0 50px rgba(245,166,35,.3);}
    .ov-emoji{font-size:4.2rem;margin-bottom:.4rem;}
    .ov-title{font-family:'Fredoka One',cursive;font-size:2.1rem;color:#F5A623;
              margin-bottom:.3rem;}
    .ov-sub{font-size:1rem;color:#aaa;margin-bottom:1.5rem;line-height:1.5;}
    .btn-replay{font-family:'Fredoka One',cursive;font-size:1.15rem;
                background:linear-gradient(135deg,#F5A623,#E8960F);color:white;
                border:none;padding:12px 34px;border-radius:999px;cursor:pointer;
                box-shadow:0 4px 16px rgba(245,166,35,.4);}
    .btn-replay:hover{transform:scale(1.05);}

    /* ── CONFETTI ── */
    .cf{position:fixed;border-radius:2px;pointer-events:none;z-index:200;
        animation:cfall linear forwards;}
    @keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

    footer{width:100%;max-width:420px;text-align:center;padding:1rem;
           font-size:.82rem;color:#555588;font-weight:600;border-top:1px solid #1e1e40;}
    footer a{color:#F5A623;text-decoration:none;}
  </style>
</head>
<body>

<header>
  <a href="hub.html" class="back-link">← Games</a>
  <h1 id="gameTitle">🎰 Word Pinball</h1>
  <button class="btn-mute" id="btnMute">🔊</button>
</header>

<div class="cat-bar">
  <button class="btn-cat" data-key="letters">🔤 Letters</button>
  <button class="btn-cat" data-key="wordbuilding">🏗️ Word Families</button>
  <button class="btn-cat" data-key="longvowels">🗣️ Long Vowels</button>
  <button class="btn-cat" data-key="irregular">🌀 Irregular</button>
  <button class="btn-cat" data-key="digraphs">📖 Digraphs</button>
  <button class="btn-cat" data-key="rcontrolled">🔁 R-Controlled</button>
</div>

<div class="game-wrap">

  <div class="info-row">
    <div class="score-lbl">Score: <span id="scoreVal">0</span></div>
    <div class="lives-row" id="livesRow">
      <span class="life-dot">⚾</span>
      <span class="life-dot">⚾</span>
      <span class="life-dot">⚾</span>
    </div>
    <div class="q-counter" id="qCounter"></div>
  </div>

  <canvas id="gc" width="380" height="420"></canvas>

  <div class="q-display hidden" id="qDisplay">
    <div class="q-pic" id="qPic"></div>
    <div class="q-label">Which word matches?</div>
  </div>

  <div class="paddles-grid hidden" id="paddlesGrid"></div>

  <button class="btn-launch hidden" id="btnLaunch">🚀 Launch Ball!</button>

</div>

<div class="overlay hidden" id="gameOverlay">
  <div class="ov-box">
    <div class="ov-emoji" id="ovEmoji">🎰</div>
    <div class="ov-title" id="ovTitle">Game Over!</div>
    <div class="ov-sub" id="ovSub"></div>
    <button class="btn-replay" id="btnReplay">Play Again!</button>
  </div>
</div>

<footer>
  <p>Part of <a href="https://www.firststepreading.com">First Step Reading</a> &nbsp;|&nbsp; Free learn-to-read games for kids 📚</p>
</footer>

<script>
'use strict';
// ═══════════════════════════════════════════
//  PINBALL — redesigned
//  • Ball bounces off ALL 4 walls (no drain)
//  • Launch sends ball all the way up
//  • Picture shown → click matching word
//  • Wrong paddle = lose a life; 3 lives = game over
//  • Correct = +100 pts, next picture
// ═══════════════════════════════════════════

/* ── VOICE ── */
let _muted=false,_spk=false,_pend=null,_q=[],_voice=null;
function _lv(){const a=window.speechSynthesis?.getVoices()||[];if(!a.length)return;
  _voice=a.find(v=>/natural/i.test(v.name)&&/^en/i.test(v.lang))
  ||a.find(v=>/aria|jenny|guy\b|ana\b|emma|brian/i.test(v.name))
  ||a.find(v=>/google.*english/i.test(v.name))
  ||a.find(v=>/^en/i.test(v.lang))||a[0];}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=_lv;_lv();}
function _adv(){if(!_q.length){_spk=false;if(_pend){const t=_pend;_pend=null;_go(t);}return;}
  _spk=true;const u=new SpeechSynthesisUtterance(_q.shift());
  if(_voice)u.voice=_voice;u.rate=0.92;u.onend=()=>{_spk=false;setTimeout(_adv,300);};
  window.speechSynthesis.speak(u);}
function _go(t){_q=t.split(' | ').filter(Boolean);_spk=false;_adv();}
function speak(t){if(_muted||!window.speechSynthesis)return;if(_spk){_pend=t;}else{_go(t);}}

/* ── CANVAS / PHYSICS SETUP ── */
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const CW = 380, CH = 420;
canvas.width = CW; canvas.height = CH;

const BALL_R  = 13;
const BUMP_R  = 30;
const GRAV    = 0.15;
const MIN_SPD = 5.5;
const MAX_SPD = 14;
const WALL_E  = 0.75;  // wall elasticity
const BUMP_E  = 1.15;  // bumper speed multiplier

/* 6 bumper positions — upper 65% of canvas */
const BUMP_POS = [
  {x:75,  y:110},{x:190, y:85}, {x:305, y:110},
  {x:110, y:235},{x:270, y:235},{x:190, y:330},
];
const BUMP_COLORS = ['#FF6B6B','#F5A623','#6BCB77','#3A8EF6','#B45CFF','#FF6B9D'];

/* ── GAME STATE ── */
let catKey    = null;
let pool      = [];
let poolIdx   = 0;
let currentQ  = null;
let choices   = [];    // 4 answer strings
let score     = 0;
let lives     = 3;
let correct   = 0;
let wrong     = 0;
let phase     = 'idle'; // 'idle'|'serving'|'playing'|'over'
let ball      = {x:CW/2, y:CH-40, vx:0, vy:0};
let bumpers   = [];
let particles = [];
let raf       = null;

/* ── HELPERS ── */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ── CATEGORY SELECT ── */
function selectCat(key){
  catKey=key;
  document.querySelectorAll('.btn-cat').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  document.getElementById('gameTitle').textContent='🎰 '+CATS[key].title;
  startGame();
}

/* ── GAME INIT ── */
function startGame(){
  if(!catKey)return;
  score=0; lives=3; correct=0; wrong=0; phase='serving';
  pool=shuffle([...CATS[catKey].items]);
  poolIdx=0;
  currentQ=null; choices=[];

  bumpers=BUMP_POS.map((p,i)=>({
    x:p.x, y:p.y, color:BUMP_COLORS[i],
    glow:0,       // 0-1 fade
    cooldown:0,   // frames before re-trigger
  }));

  ball={x:CW/2, y:CH-50, vx:0, vy:0};
  particles=[];

  updateHUD();
  document.getElementById('qDisplay').classList.add('hidden');
  document.getElementById('paddlesGrid').classList.add('hidden');
  document.getElementById('gameOverlay').classList.add('hidden');
  document.getElementById('btnLaunch').classList.remove('hidden');

  if(!raf) raf=requestAnimationFrame(loop);
}

/* ── LAUNCH ── */
function launch(){
  if(phase!=='serving')return;
  phase='playing';
  ball.vx=(Math.random()*2-1)*2.5;
  ball.vy=-15;   // strong upward launch — ball goes all the way up
  document.getElementById('btnLaunch').classList.add('hidden');
  // Show first question immediately
  nextQuestion();
}

/* ── QUESTION ── */
function nextQuestion(){
  if(poolIdx>=pool.length){ win(); return; }   // all words done → YOU WIN
  currentQ=pool[poolIdx++];

  // Build 4 choices: 1 correct + 3 distractors
  const all=CATS[catKey].items.map(i=>i.ans).filter(a=>a!==currentQ.ans);
  const dist=shuffle(all).slice(0,3);
  choices=shuffle([currentQ.ans,...dist]);

  // Display
  const isLetter=(currentQ.type==='letter');
  const qPic=document.getElementById('qPic');
  if(isLetter){
    qPic.textContent=currentQ.pic;
    qPic.className='q-pic letter-pic';
    document.querySelector('#qDisplay .q-label').textContent='Find the lowercase letter!';
  }else{
    if(PIC_OVERRIDES[currentQ.ans]){
      qPic.innerHTML=PIC_OVERRIDES[currentQ.ans];
    }else{
      qPic.textContent=currentQ.pic;
    }
    qPic.className='q-pic';
    document.querySelector('#qDisplay .q-label').textContent='Which word matches?';
  }
  document.getElementById('qDisplay').classList.remove('hidden');

  buildPaddles();
  speak(isLetter ? `${currentQ.pic} | Find the lowercase ${currentQ.ans}` : currentQ.ans);
}

function buildPaddles(){
  const grid=document.getElementById('paddlesGrid');
  grid.innerHTML='';
  grid.classList.remove('hidden');
  choices.forEach((word,i)=>{
    const btn=document.createElement('button');
    btn.className=`paddle-btn c${i}`;
    btn.textContent=word;
    btn.addEventListener('click',()=>handlePaddle(btn,word));
    grid.appendChild(btn);
  });
}

/* ── ANSWER HANDLING ── */
let _ansLocked=false;
function handlePaddle(btn,word){
  if(_ansLocked||phase!=='playing')return;
  _ansLocked=true;

  if(word===currentQ.ans){
    // ✅ CORRECT
    correct++;
    score+=100;
    btn.classList.add('flash-correct');
    speak(`${word}! | Great job!`);
    spawnBurst(ball.x, ball.y, '#F5A623');
    ball.vy=clamp(ball.vy,-MAX_SPD,-6); // slight upward boost
    updateHUD();
    smallConfetti();
    setTimeout(()=>{
      btn.classList.remove('flash-correct');
      _ansLocked=false;
      nextQuestion();
    },550);

  }else{
    // ❌ WRONG — lose a life, next question
    wrong++;
    lives--;
    btn.classList.add('flash-wrong');
    speak(`Try again!`);
    updateHUD();
    setTimeout(()=>{
      btn.classList.remove('flash-wrong');
      _ansLocked=false;
      if(lives<=0){
        gameOver();
      }else{
        nextQuestion();
      }
    },700);
  }
}

/* ── HUD ── */
function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  const dots=document.getElementById('livesRow').querySelectorAll('.life-dot');
  dots.forEach((d,i)=>d.classList.toggle('gone',i>=lives));
  const total=correct+wrong;
  document.getElementById('qCounter').textContent=total?`✓ ${correct}/${total}`:'';
}

/* ── GAME OVER ── */
let _overFired=false;
function gameOver(){
  if(_overFired||phase==='over')return;
  _overFired=true;
  phase='over';
  document.getElementById('paddlesGrid').classList.add('hidden');
  document.getElementById('qDisplay').classList.add('hidden');
  speak(`Game over! | You scored ${score} points!`);

  const emoji=score>=500?'🏆':score>=200?'⭐':'🎰';
  document.getElementById('ovEmoji').textContent=emoji;
  document.getElementById('ovTitle').textContent=score>=500?'Amazing!':'Game Over!';
  document.getElementById('ovSub').innerHTML=
    `Score: <strong style="color:#F5A623;font-size:1.3em">${score}</strong><br>`+
    `${correct} correct &nbsp;·&nbsp; ${wrong} wrong`;
  document.getElementById('gameOverlay').classList.remove('hidden');
  if(score>=500) launchConfetti();
}

/* ── WIN ── */
function win(){
  if(phase==='over')return;
  phase='over';
  document.getElementById('paddlesGrid').classList.add('hidden');
  document.getElementById('qDisplay').classList.add('hidden');
  speak(`You win! | Amazing! | You scored ${score} points!`);
  launchConfetti();
  document.getElementById('ovEmoji').textContent='🏆';
  document.getElementById('ovTitle').textContent='You Win!';
  document.getElementById('ovSub').innerHTML=
    `Score: <strong style="color:#F5A623;font-size:1.3em">${score}</strong><br>`+
    `${correct} correct &nbsp;·&nbsp; ${wrong} wrong<br>`+
    `<span style="font-size:.85em;color:#8888bb">You matched every picture! 🎉</span>`;
  document.getElementById('gameOverlay').classList.remove('hidden');
}

/* ── PHYSICS LOOP ── */
function loop(){
  raf=requestAnimationFrame(loop);
  if(phase==='playing')updatePhysics();
  draw();
}

function updatePhysics(){
  // Gravity
  ball.vy+=GRAV;

  // Speed clamp
  let spd=Math.hypot(ball.vx,ball.vy);
  if(spd>MAX_SPD){ball.vx*=MAX_SPD/spd;ball.vy*=MAX_SPD/spd;spd=MAX_SPD;}
  // Minimum speed — keeps ball alive
  if(spd<MIN_SPD&&spd>0.1){const s=MIN_SPD/spd;ball.vx*=s;ball.vy*=s;}

  ball.x+=ball.vx;
  ball.y+=ball.vy;

  // ── WALL BOUNCES (all 4 walls — no drain!) ──
  if(ball.x-BALL_R<0){ball.x=BALL_R;ball.vx=Math.abs(ball.vx)*WALL_E;}
  if(ball.x+BALL_R>CW){ball.x=CW-BALL_R;ball.vx=-Math.abs(ball.vx)*WALL_E;}
  if(ball.y-BALL_R<0){ball.y=BALL_R;ball.vy=Math.abs(ball.vy)*WALL_E;}
  if(ball.y+BALL_R>CH){                       // BOTTOM — bounce back up
    ball.y=CH-BALL_R;
    ball.vy=-Math.abs(ball.vy)*WALL_E;
    // Ensure enough upward momentum so ball gets back up
    if(Math.abs(ball.vy)<MIN_SPD) ball.vy=-MIN_SPD;
  }

  // ── BUMPER COLLISIONS ──
  bumpers.forEach(b=>{
    const dx=ball.x-b.x, dy=ball.y-b.y;
    const d=Math.hypot(dx,dy);
    if(d<BALL_R+BUMP_R&&d>0){
      const angle=Math.atan2(dy,dx);
      const overlap=BALL_R+BUMP_R-d;
      ball.x+=Math.cos(angle)*overlap;
      ball.y+=Math.sin(angle)*overlap;
      const s=Math.hypot(ball.vx,ball.vy);
      ball.vx=Math.cos(angle)*s*BUMP_E;
      ball.vy=Math.sin(angle)*s*BUMP_E;
      if(b.cooldown===0){
        b.glow=1;
        b.cooldown=35;
        spawnBurst(b.x,b.y,b.color);
      }
    }
    if(b.cooldown>0)b.cooldown--;
    if(b.glow>0)b.glow=Math.max(0,b.glow-0.04);
  });

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;p.r=Math.max(0,p.r-.1);});
  particles=particles.filter(p=>p.life>0&&p.r>0);
}

/* ── DRAW ── */
function draw(){
  // Background
  ctx.fillStyle='#0a0a1f';
  ctx.fillRect(0,0,CW,CH);

  // Subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  for(let x=0;x<CW;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // Neon side walls
  ctx.strokeStyle='rgba(245,166,35,0.35)';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(2,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CW-2,0);ctx.lineTo(CW-2,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(CW,2);ctx.stroke();

  // Bumpers
  bumpers.forEach(b=>{
    const glow=b.glow;
    // Outer glow ring
    if(glow>0){
      const g2=ctx.createRadialGradient(b.x,b.y,BUMP_R*.5,b.x,b.y,BUMP_R*2);
      g2.addColorStop(0,b.color+Math.round(glow*160).toString(16).padStart(2,'0'));
      g2.addColorStop(1,'transparent');
      ctx.fillStyle=g2;
      ctx.beginPath();ctx.arc(b.x,b.y,BUMP_R*2,0,Math.PI*2);ctx.fill();
    }
    // Body
    ctx.shadowBlur=glow>0?22:8;
    ctx.shadowColor=b.color;
    const alpha=Math.round((0.55+glow*0.45)*255).toString(16).padStart(2,'0');
    ctx.fillStyle=b.color+alpha;
    ctx.strokeStyle=b.color;
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(b.x,b.y,BUMP_R,0,Math.PI*2);
    ctx.fill();ctx.stroke();
    ctx.shadowBlur=0;

    // Star decoration
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='14px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('★',b.x,b.y);
  });

  // Ball (always draw — shows during serving too)
  const bx=ball.x, by=ball.y;
  const bg=ctx.createRadialGradient(bx-3,by-3,1,bx,by,BALL_R);
  bg.addColorStop(0,'white');
  bg.addColorStop(0.6,'#ddd');
  bg.addColorStop(1,'#999');
  ctx.shadowBlur=14;
  ctx.shadowColor='rgba(255,255,255,0.55)';
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.arc(bx,by,BALL_R,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Serving glow ring
  if(phase==='serving'){
    ctx.strokeStyle='rgba(245,166,35,0.5)';
    ctx.lineWidth=2;
    const t=Date.now()/500;
    const pulse=BALL_R+4+Math.sin(t)*4;
    ctx.beginPath();ctx.arc(bx,by,pulse,0,Math.PI*2);ctx.stroke();
  }

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.min(1,p.life/15);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Idle prompt
  if(phase==='idle'||!catKey){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font='bold 20px "Fredoka One",cursive';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('👆 Choose a category above!',CW/2,CH/2);
  }
}

/* ── PARTICLES ── */
function spawnBurst(x,y,color){
  const colors=['#F5A623','#FFD93D','#FF6B6B',color,'white'];
  for(let i=0;i<10;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({
      x,y,
      vx:Math.cos(angle)*spd,
      vy:Math.sin(angle)*spd,
      r:3+Math.random()*3,
      color:colors[i%colors.length],
      life:18+Math.random()*8|0,
    });
  }
}

function smallConfetti(){
  const colors=['#F5A623','#3A8EF6','#6BCB77','#FF6B6B','#B45CFF'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='cf';
    p.style.cssText=`left:${30+Math.random()*40}vw;top:-8px;`+
      `background:${colors[i%colors.length]};`+
      `width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;`+
      `animation-duration:${1+Math.random()*1.2}s;`;
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

function launchConfetti(){
  const colors=['#F5A623','#3A8EF6','#6BCB77','#FF6B6B','#B45CFF','#FFD93D'];
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const p=document.createElement('div');
      p.className='cf';
      p.style.cssText=`left:${Math.random()*100}vw;top:-8px;`+
        `background:${colors[Math.floor(Math.random()*colors.length)]};`+
        `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`+
        `animation-duration:${1.5+Math.random()*2}s;`;
      document.body.appendChild(p);
      p.addEventListener('animationend',()=>p.remove());
    },i*30);
  }
}

/* ── EVENTS ── */
document.getElementById('btnLaunch').addEventListener('click', launch);
canvas.addEventListener('click', ()=>{ if(phase==='serving') launch(); });

document.querySelectorAll('.btn-cat').forEach(btn=>{
  btn.addEventListener('click',()=>{ _overFired=false; selectCat(btn.dataset.key); });
});

document.getElementById('btnReplay').addEventListener('click',()=>{
  _overFired=false;
  document.getElementById('gameOverlay').classList.add('hidden');
  if(catKey) startGame();
});

document.getElementById('btnMute').addEventListener('click',()=>{
  _muted=!_muted;
  const b=document.getElementById('btnMute');
  b.textContent=_muted?'🔇':'🔊';
  b.classList.toggle('muted',_muted);
  if(_muted&&window.speechSynthesis) window.speechSynthesis.cancel();
});

/* ── URL PARAM AUTO-SELECT ── */
const _p=new URLSearchParams(location.search).get('cat');
if(_p&&URL_MAP[_p.toLowerCase()]){
  setTimeout(()=>{_overFired=false;selectCat(URL_MAP[_p.toLowerCase()]);},120);
} else {
  // Start render loop for idle display
  raf=requestAnimationFrame(loop);
}
</script>
