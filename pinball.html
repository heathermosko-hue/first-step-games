<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Word Pinball | First Step Reading</title>
  <link href="fonts.css?v=3" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family: 'Comic Sans MS', 'Comic Neue';
         background:url('icons/bg-pinball-arcade.png?v=2') center/cover no-repeat fixed, #0d0018;
         color:#eee; height:100vh; height:100dvh; overflow:hidden;
         display:flex; flex-direction:column; align-items:center;}

    /* Full-width header — shows arcade bg on sides */
    header{width:100%; background:rgba(0,0,0,0.55);
           padding:.5rem 1rem;display:flex;align-items:center;gap:.6rem;
           box-shadow:0 3px 14px rgba(0,0,0,.5); position:relative; z-index:2;
           backdrop-filter:blur(6px);}
    .back-link{color:white;text-decoration:none;font-weight:700;font-size:.85rem;
               background:rgba(255,166,35,.7);padding:5px 13px;border-radius:999px;
               white-space:nowrap;flex-shrink:0;}
    header h1{font-family: 'Comic Sans MS', 'Comic Neue';color:white;
              font-size:clamp(1.1rem,4vw,1.6rem);flex:1;text-align:center;
              text-shadow:0 0 20px rgba(245,166,35,.8);}
    .btn-mute{background:rgba(255,166,35,.5);border:none;color:white;
              font-size:1.05rem;padding:5px 11px;border-radius:999px;cursor:pointer;flex-shrink:0;}
    .btn-mute.muted{background:rgba(255,80,80,.55);}

    /* Full-width cat-bar — shows arcade bg on sides */
    .cat-bar{width:100%; background:rgba(0,0,0,0.45);
             padding:.25rem .6rem;display:flex;gap:.25rem;flex-wrap:nowrap;overflow-x:auto;
             justify-content:center; position:relative; z-index:2;
             backdrop-filter:blur(4px);}
    .btn-cat{font-family: 'Comic Sans MS', 'Comic Neue';font-weight:700;font-size:.82rem;
             border:2px solid rgba(245,166,35,0.5);background:rgba(20,20,60,0.7);color:#ccccff;
             padding:5px 13px;border-radius:999px;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-cat:hover{border-color:#F5A623;color:#F5A623;}
    .btn-cat.active{background:#F5A623;border-color:#F5A623;color:white;}

    /* ── MACHINE CABINET ── */
    /* Narrower than viewport so arcade bg always shows on sides */
    .machine-wrap{width:92%; max-width:400px; flex:1; min-height:0; display:flex; flex-direction:column;
                  align-items:center; padding:0 0 .1rem; overflow:hidden; position:relative; z-index:1; justify-content:flex-start;}
    /* Scale down the entire machine cabinet on short screens */
    @media (max-height: 680px) {
      .machine-outer { transform: scale(0.88); transform-origin: top center; margin-top:.2rem; }
    }
    @media (max-height: 580px) {
      .machine-outer { transform: scale(0.75); transform-origin: top center; margin-top:0; }
    }
    .machine-outer{
      position:relative;
      width:100%; max-width:392px;
      margin-top:.5rem;
      background:rgba(10,0,30,0.78);
      border-radius:20px 20px 10px 10px;
      padding:6px 6px 4px;
      box-shadow:0 0 40px rgba(245,166,35,.5),0 0 90px rgba(180,92,255,.3),
                 inset 0 0 30px rgba(0,0,0,.6);
    }
    /* Neon trim border */
    .machine-outer::before{
      content:'';position:absolute;inset:0;border-radius:20px 20px 10px 10px;
      background:transparent;
      border:3px solid transparent;
      background-clip:padding-box;
      box-shadow:0 0 0 3px #F5A623,0 0 20px #F5A623,inset 0 0 20px rgba(245,166,35,.1);
      pointer-events:none;
    }
    /* Side neon tubes */
    .neon-left,.neon-right{
      position:absolute;top:8%;bottom:8%;width:5px;border-radius:3px;
      background:linear-gradient(180deg,#FF6B6B,#F5A623,#6BCB77,#3A8EF6,#B45CFF);
    }
    .neon-left{left:-9px;box-shadow:-3px 0 12px rgba(245,166,35,.7);}
    .neon-right{right:-9px;box-shadow:3px 0 12px rgba(245,166,35,.7);}

    canvas{display:block;width:100%;border-radius:14px 14px 6px 6px;cursor:crosshair;}

    /* Question display above machine */
    .q-display{
      width:100%;max-width:392px;
      background:#16163a;border:2px solid #2a2a5a;border-bottom:none;
      border-radius:14px 14px 0 0;
      padding:.4rem .8rem;display:flex;align-items:center;justify-content:center;gap:.8rem;
      min-height:60px;
    }
    .q-display.hidden{display:none;}
    .q-pic{font-size:2.8rem;line-height:1;}
    .q-pic.letter-pic{font-family: 'Comic Sans MS', 'Comic Neue';font-size:3.5rem;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.7),0 0 16px rgba(245,166,35,.6);line-height:1;}
    .q-label{font-size:.9rem;font-weight:700;color:#aaaacc;line-height:1.4;text-align:center;}

    .btn-launch{font-family: 'Comic Sans MS', 'Comic Neue';font-size:1.3rem;
                background:linear-gradient(135deg,#F5A623,#E8960F);color:white;
                border:none;padding:13px 40px;border-radius:999px;cursor:pointer;
                box-shadow:0 5px 18px rgba(245,166,35,.45);margin-top:.7rem;
                animation:launch-bounce .9s ease-in-out infinite;transition:transform .15s;}
    .btn-launch:hover{animation:none;transform:scale(1.07);}
    @keyframes launch-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
    .hidden{display:none !important;}
    .flipper-btns{
      display:flex;gap:.5rem;margin-top:.3rem;
      width:100%;max-width:392px;
    }
    .btn-flip{
      flex:1;font-family:'Comic Sans MS','Comic Neue';font-size:1rem;font-weight:700;
      background:rgba(245,166,35,0.15);border:2px solid rgba(245,166,35,0.5);color:#F5A623;
      padding:12px 0;border-radius:14px;cursor:pointer;
      user-select:none;-webkit-user-select:none;touch-action:none;
      transition:background .1s,color .1s,border-color .1s;letter-spacing:.5px;
    }
    .btn-flip.pressed{background:rgba(245,166,35,0.5);color:white;border-color:#F5A623;
      box-shadow:0 0 12px rgba(245,166,35,.4);}
    .btn-flip:disabled{opacity:0.28;cursor:default;}

    /* ── BUMPER ANSWER BUTTONS (round, sit over canvas bumper circles) ── */
    .bumper-btn{
      position:absolute;
      width:24.2%; /* ~92px / 380px canvas */
      aspect-ratio:1/1;
      border-radius:50%;
      border:3px solid currentColor;
      font-family:'Comic Sans MS','Comic Neue';
      font-size:clamp(.7rem,2.8vw,1.05rem);
      font-weight:700;
      color:#fff;
      cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      display:none; /* shown via JS */
      align-items:center;justify-content:center;
      text-align:center;line-height:1.2;
      padding:4px;
      user-select:none;-webkit-user-select:none;
      transform:translate(-50%,-50%);
      z-index:10;
      transition:filter .12s,transform .08s;
    }
    .bumper-btn:active{filter:brightness(1.5);transform:translate(-50%,-50%) scale(1.08);}
    .bumper-btn:disabled{opacity:.35;pointer-events:none;}
    #bov0{left:28.9%;top:38.6%;background:rgba(58,142,246,0.82);border-color:#3A8EF6;box-shadow:0 0 14px rgba(58,142,246,.7);}
    #bov1{left:71.1%;top:38.6%;background:rgba(255,107,107,0.82);border-color:#FF6B6B;box-shadow:0 0 14px rgba(255,107,107,.7);}
    #bov2{left:28.9%;top:65.5%;background:rgba(107,203,119,0.82);border-color:#6BCB77;box-shadow:0 0 14px rgba(107,203,119,.7);}
    #bov3{left:71.1%;top:65.5%;background:rgba(180,92,255,0.82);border-color:#B45CFF;box-shadow:0 0 14px rgba(180,92,255,.7);}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);
             display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
    .overlay.hidden{display:none;}
    .ov-box{background:#14143a;border:3px solid #F5A623;border-radius:24px;
            padding:2.2rem 2rem;text-align:center;max-width:340px;width:100%;
            box-shadow:0 0 50px rgba(245,166,35,.4);}
    .ov-emoji{font-size:4.5rem;margin-bottom:.4rem;}
    .ov-title{font-family: 'Comic Sans MS', 'Comic Neue';font-size:2.2rem;color:#F5A623;margin-bottom:.3rem;}
    .ov-sub{font-size:1rem;color:#aaa;margin-bottom:1.5rem;line-height:1.6;}
    .btn-replay{font-family: 'Comic Sans MS', 'Comic Neue';font-size:1.2rem;
                background:linear-gradient(135deg,#F5A623,#E8960F);color:white;
                border:none;padding:14px 36px;border-radius:999px;cursor:pointer;
                box-shadow:0 4px 16px rgba(245,166,35,.4);transition:transform .15s;}
    .btn-replay:hover{transform:scale(1.06);}

    .cf{position:fixed;border-radius:2px;pointer-events:none;z-index:200;animation:cfall linear forwards;}
    @keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

    footer{display:none;}
    footer a{color:#F5A623;text-decoration:none;}
  </style>
<script src="tts.js?v=11"></script>
</head>
<body>

<header>
  <a href="hub.html" class="back-link">← Games</a>
  <h1 id="gameTitle">🎰 Word Pinball</h1>
  <button class="btn-mute" id="btnMute">🔊</button>
</header>

<div class="cat-bar">
  <button class="btn-cat" data-key="letters">🔤 Letters</button>
  <button class="btn-cat" data-key="wordbuilding">🏗️ Word Families</button>
  <button class="btn-cat" data-key="longvowels">🗣️ Long Vowels</button>
  <button class="btn-cat" data-key="irregular">🌀 Irregular</button>
  <button class="btn-cat" data-key="digraphs">📖 Digraphs</button>
  <button class="btn-cat" data-key="rcontrolled">🔁 R-Controlled</button>
</div>

<div class="machine-wrap">
  <div class="q-display hidden" id="qDisplay">
    <div class="q-pic" id="qPic"></div>
    <div class="q-label" id="qLabel">Which word matches?</div>
  </div>
  <div class="machine-outer">
    <div class="neon-left"></div>
    <div class="neon-right"></div>
    <canvas id="gc" width="380" height="440"></canvas>
    <!-- Round bumper answer buttons — sit over canvas bumper circles -->
    <button class="bumper-btn" id="bov0"></button>
    <button class="bumper-btn" id="bov1"></button>
    <button class="bumper-btn" id="bov2"></button>
    <button class="bumper-btn" id="bov3"></button>
  </div>
  <div class="flipper-btns" id="flipperBtns" style="display:none">
    <button class="btn-flip" id="btnFlipL" disabled>◀ LEFT FLIPPER</button>
    <button class="btn-flip" id="btnFlipR" disabled>RIGHT FLIPPER ▶</button>
  </div>
  <button class="btn-launch hidden" id="btnLaunch">🚀 Launch Ball!</button>
</div>

<div class="overlay hidden" id="gameOverlay">
  <div class="ov-box">
    <div class="ov-emoji" id="ovEmoji">🎰</div>
    <div class="ov-title" id="ovTitle">Game Over!</div>
    <div class="ov-sub" id="ovSub"></div>
    <button class="btn-replay" id="btnReplay">🎮 Play Again!</button>
  </div>
</div>

<script>
'use strict';

/* ── VOICE ── */
let _muted=false,_spk=false,_pend=null,_q=[],_voice=null;
function _lv(){const a=window.speechSynthesis?.getVoices()||[];if(!a.length)return;
  const en=a.filter(v=>/^en/i.test(v.lang));_voice=en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\b(jenny|emma)\b/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/female/i.test(v.name))||en.find(v=>/\b(samantha|karen|moira|serena|victoria|tessa|fiona|kate|zoe|allison|ava|zira|eva|hazel|susan)\b/i.test(v.name))||en.find(v=>/natural|neural|online/i.test(v.name))||en.find(v=>/google.*english/i.test(v.name))||en[0]||a[0];}
if(window.speechSynthesis){window.speechSynthesis.addEventListener("voiceschanged", _lv);_lv();}
function _adv(){if(!_q.length){_spk=false;if(_pend){const t=_pend;_pend=null;_go(t);}return;}
  _spk=true;const u=new SpeechSynthesisUtterance(_q.shift());
  if(_voice)u.voice=_voice;u.rate=0.92;u.onend=()=>{_spk=false;setTimeout(_adv,300);};
  window.speechSynthesis.speak(u);}
function _go(t){_q=t.split(' | ').filter(Boolean);_spk=false;_adv();}
function speak(t){if(_muted||!window.speechSynthesis)return;if(_spk){_pend=t;}else{_go(t);}}

/* ── AUDIO ── */
let _ac=null;
function ensureAC(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playBuzzer(){
  if(_muted)return;ensureAC();if(!_ac)return;
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(220,_ac.currentTime);
  o.frequency.linearRampToValueAtTime(60,_ac.currentTime+0.35);
  g.gain.setValueAtTime(0.35,_ac.currentTime);
  g.gain.linearRampToValueAtTime(0,_ac.currentTime+0.4);
  o.connect(g);g.connect(_ac.destination);
  o.start();o.stop(_ac.currentTime+0.4);
}
function playCorrect(){
  if(_muted)return;ensureAC();if(!_ac)return;
  [523,659,784].forEach((f,i)=>{
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.type='sine';o.frequency.value=f;
    const t=_ac.currentTime+i*0.11;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.04);
    g.gain.linearRampToValueAtTime(0,t+0.13);
    o.connect(g);g.connect(_ac.destination);
    o.start(t);o.stop(t+0.15);
  });
}

  'stir': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" style="width:2.8rem;height:2.8rem"><g transform="rotate(40,40,40)"><rect x="38" y="24" width="5" height="44" rx="2.5" fill="#D0D0D0"/></g><path d="M10,40 Q10,70 40,70 Q70,70 70,40 Z" fill="#D4A45A"/><ellipse cx="40" cy="40" rx="30" ry="8" fill="#C08040"/><path d="M14,46 Q14,66 40,66 Q66,66 66,46 Z" fill="#E8C87A"/></svg>`,
  'fork': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" style="width:2.8rem;height:2.8rem"><rect x="19" y="6" width="6" height="26" rx="3" fill="#B8B8B8"/><rect x="29" y="6" width="6" height="26" rx="3" fill="#B8B8B8"/><rect x="39" y="6" width="6" height="26" rx="3" fill="#B8B8B8"/><rect x="49" y="6" width="6" height="26" rx="3" fill="#B8B8B8"/><rect x="19" y="30" width="36" height="6" rx="3" fill="#B8B8B8"/><rect x="30" y="44" width="20" height="28" rx="10" fill="#B8B8B8"/></svg>`,

/* ── CONSTANTS ── */

const MAX_SPD = 13;
const WALL_E  = 0.76;

// 4 answer bumper positions
const BUMP_POS=[{x:110,y:170},{x:270,y:170},{x:110,y:288},{x:270,y:288}];

// Flipper geometry
const FL_PIV={x:68,y:393};
const FR_PIV={x:312,y:393};
const DRAIN_X1=163, DRAIN_X2=217;
// Flipper tip positions: rest (down) and active (up)
const FL_TIP_REST={x:163,y:402}, FL_TIP_ACT={x:163,y:376};
const FR_TIP_REST={x:217,y:402}, FR_TIP_ACT={x:217,y:376};

/* ── STATE ── */
let catKey=null,pool=[],poolIdx=0,currentQ=null,choices=[];
let score=0,ballsLeft=3,correct=0,wrong=0;
let phase='idle'; // idle|serving|playing|draining|over
let ball={x:CW/2,y:CH-52,vx:0,vy:0};
let bumpers=[];
let particles=[];
let raf=null;
let flashMsg=null;
let drainCountdown=0;
let _ansLocked=false,_overFired=false;
let flipL=false,flipR=false;

/* ── HELPERS ── */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ── SELECT CATEGORY ── */
function selectCat(key){
  catKey=key;
  document.querySelectorAll('.btn-cat').forEach(b=>b.classList.toggle('active',b.dataset.key===key));
  document.getElementById('gameTitle').textContent='🎰 '+CATS[key].title;
  startGame();
}

/* ── START GAME ── */
function startGame(){
  if(!catKey)return;
  score=0;ballsLeft=3;correct=0;wrong=0;_overFired=false;_ansLocked=false;
  phase='serving';
  pool=shuffle([...CATS[catKey].items]);
  poolIdx=0;currentQ=null;choices=[];flashMsg=null;drainCountdown=0;
  ball={x:CW/2,y:CH-52,vx:0,vy:0};
  particles=[];

  bumpers=BUMP_POS.map((p,i)=>({x:p.x,y:p.y,color:BUMP_COLS[i],
    glow:0,cooldown:0,word:'',isCorrect:false,flash:0,flashCol:''}));

  document.getElementById('qDisplay').classList.add('hidden');
  document.getElementById('gameOverlay').classList.add('hidden');
  document.getElementById('btnLaunch').classList.remove('hidden');
  document.getElementById('flipperBtns').style.display='none';
  setOverlayEnabled(false);
  if(!raf)raf=requestAnimationFrame(loop);
}

/* ── LAUNCH ── */
function launch(){
  if(phase!=='serving')return;
  phase='playing';
  ball.vx=(Math.random()*2-1)*2.5;
  ball.vy=-14;
  document.getElementById('btnLaunch').classList.add('hidden');
  nextQuestion();
}

/* ── NEXT QUESTION ── */
function nextQuestion(){
  if(poolIdx>=pool.length){doWin();return;}
  currentQ=pool[poolIdx++];
  const all=CATS[catKey].items.map(i=>i.ans).filter(a=>a!==currentQ.ans);
  choices=shuffle([currentQ.ans,...shuffle(all).slice(0,3)]);
  bumpers.forEach((b,i)=>{b.word=choices[i];b.isCorrect=(choices[i]===currentQ.ans);b.flash=0;b.glow=0.3;});
  updateAnswerBtnText();
  setOverlayEnabled(true);

  const isLetter=currentQ.type==='letter';
  const qPic=document.getElementById('qPic');
  if(isLetter){qPic.textContent=currentQ.pic;qPic.className='q-pic letter-pic';
    document.getElementById('qLabel').textContent='Find the lowercase letter!';}
  else{
    if(PIC_OVERRIDES[currentQ.ans])qPic.innerHTML=PIC_OVERRIDES[currentQ.ans];
    else qPic.textContent=currentQ.pic;
    qPic.className='q-pic';
    document.getElementById('qLabel').textContent='Which word matches?';
  }
  document.getElementById('qDisplay').classList.remove('hidden');
  speak(isLetter?`${currentQ.pic} | Find the lowercase ${currentQ.ans}`:currentQ.ans);
}

/* ── HIT BUMPER (physics-triggered) ── */
function hitBumper(idx){
  if(phase!=='playing')return;
  const b=bumpers[idx];

  if(b.isCorrect){
    correct++;score+=100;
    b.flash=1;b.flashCol='#6BCB77';
    playCorrect();
    speak(`${b.word}! | Great job!`);
    spawnBurst(b.x,b.y,'#6BCB77');
    // Keep ball energized & bouncing — redirect upward
    const curSpd=Math.hypot(ball.vx,ball.vy);
    const newSpd=Math.max(curSpd*1.15,9);
    ball.vy=-Math.abs(ball.vy)-4;
    ball.vx+=(Math.random()*2-1)*3;
    const s2=Math.hypot(ball.vx,ball.vy);
    if(s2>0){ball.vx=ball.vx/s2*newSpd;ball.vy=ball.vy/s2*newSpd;}
    setFlash('✓  '+b.word+'!','#6BCB77');
    smallConfetti();
    setOverlayEnabled(false);
    setTimeout(()=>{ nextQuestion(); },700);

  }else{
    wrong++;ballsLeft--;
    b.flash=1;b.flashCol='#FF4444';
    playBuzzer();
    const livesLeft=ballsLeft;
    speak('Oops! | Try again!');
    setFlash(livesLeft>0?`✗ Wrong! ${livesLeft} chance${livesLeft!==1?'s':''} left!`:'✗ Wrong!','#FF4444');
    // Ball keeps bouncing — just kick it upward so it doesn't get stuck
    ball.vy=-Math.abs(ball.vy)*1.2-4;
    ball.vx+=(Math.random()*2-1)*3;
    if(ballsLeft<=0){setTimeout(doGameOver,900);return;}
  }
}

function setFlash(text,color){flashMsg={text,color,alpha:1,timer:70};}

/* ── ANSWER PANEL ── */
function showAnswerPanel(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('bov'+i);
    if(b){b.style.display='flex';b.disabled=false;}
  }
}
function hideAnswerPanel(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('bov'+i);
    if(b){b.style.display='none';}
  }
}
function setOverlayEnabled(on){
  if(on) showAnswerPanel(); else hideAnswerPanel();
}
function updateAnswerBtnText(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('bov'+i);
    if(b) b.textContent = choices[i]||'';
  }
}
function tapAnswerBtn(idx){
  if(phase==='serving'){launch();return;}
  if(phase!=='playing')return;
  const b=bumpers[idx];
  if(!b||!b.word)return;
  b.glow=1;spawnBurst(b.x,b.y,b.color);
  hitBumper(idx);
}

/* ── GAME OVER / WIN ── */
function doGameOver(){
  if(_overFired||phase==='over')return;
  _overFired=true;phase='over';
  document.getElementById('qDisplay').classList.add('hidden');
  document.getElementById('btnLaunch').classList.add('hidden');
  document.getElementById('flipperBtns').style.display='none';
  setOverlayEnabled(false);
  speak(`Game over! | You scored ${score} points!`);
  const emoji=score>=500?'🏆':score>=200?'⭐':'😅';
  document.getElementById('ovEmoji').textContent=emoji;
  document.getElementById('ovTitle').textContent=score>=500?'Amazing!':'Game Over!';
  document.getElementById('ovSub').innerHTML=
    `Score: <strong style="color:#F5A623;font-size:1.3em">${score}</strong><br>`+
    `${correct} correct &nbsp;·&nbsp; ${wrong} wrong`;
  document.getElementById('gameOverlay').classList.remove('hidden');
  if(score>=500)launchConfetti();
}

function doWin(){
  if(phase==='over')return;phase='over';
  document.getElementById('qDisplay').classList.add('hidden');
  document.getElementById('btnLaunch').classList.add('hidden');
  document.getElementById('flipperBtns').style.display='none';
  setOverlayEnabled(false);
  speak(`You win! | Amazing! | You scored ${score} points!`);
  launchConfetti();
  document.getElementById('ovEmoji').textContent='🏆';
  document.getElementById('ovTitle').textContent='You Win! 🎉';
  document.getElementById('ovSub').innerHTML=
    `Score: <strong style="color:#F5A623;font-size:1.3em">${score}</strong><br>`+
    `${correct} correct &nbsp;·&nbsp; ${wrong} wrong<br>`+
    `<span style="font-size:.85em;color:#8888bb">You matched every picture!</span>`;
  document.getElementById('gameOverlay').classList.remove('hidden');
}

/* ── PHYSICS ── */
function updatePhysics(){
  ball.vy+=GRAV;
  const spd=Math.hypot(ball.vx,ball.vy);
  if(spd>MAX_SPD){const s=MAX_SPD/spd;ball.vx*=s;ball.vy*=s;}
  if(phase==='playing'&&spd<MIN_SPD&&spd>0.01){const s=MIN_SPD/spd;ball.vx*=s;ball.vy*=s;}
  ball.x+=ball.vx;ball.y+=ball.vy;

  // Safety net — bounce ball back if it escapes the field
  if(ball.y>CH+20){ ball.y=CH-BALL_R*2; ball.vy=-Math.abs(ball.vy)*1.2-4; }

  // Wall bounces
  if(ball.x-BALL_R<6){ball.x=6+BALL_R;ball.vx=Math.abs(ball.vx)*WALL_E;}
  if(ball.x+BALL_R>CW-6){ball.x=CW-6-BALL_R;ball.vx=-Math.abs(ball.vx)*WALL_E;}
  if(ball.y-BALL_R<FIELD_TOP+4){ball.y=FIELD_TOP+4+BALL_R;ball.vy=Math.abs(ball.vy)*WALL_E;}

  // Bottom zone — all sections bounce the ball back up (drain gap fully blocked)
  if(ball.y+BALL_R>374){
    if(ball.x>DRAIN_X1&&ball.x<DRAIN_X2){
      // Drain gap — fully blocked, bounce back
      ball.vy=-Math.abs(ball.vy)*WALL_E*0.9;
      ball.y=374-BALL_R;
      if(Math.abs(ball.vx)<1.5)ball.vx=(ball.vx>=0?1:-1)*2.5;
    }else if(ball.x<=DRAIN_X1){
      // Left flipper — auto-active
      ball.vy=-Math.abs(ball.vy)*WALL_E*1.55;
      ball.y=374-BALL_R;
      ball.vx=Math.abs(ball.vx)*0.9+2;
    }else{
      // Right flipper — auto-active
      ball.vy=-Math.abs(ball.vy)*WALL_E*1.55;
      ball.y=374-BALL_R;
      ball.vx=-(Math.abs(ball.vx)*0.9+2);
    }
  }

  // Diagonal guide walls
  if(ball.y>348&&ball.x<130){
    const wallY=0.565*(ball.x-6)+358;
    if(ball.y+BALL_R>wallY){ball.vy=-Math.abs(ball.vy)*WALL_E;ball.vx=Math.abs(ball.vx)+0.5;ball.y=wallY-BALL_R;}
  }
  if(ball.y>348&&ball.x>250){
    const wallY=-0.565*(ball.x-374)+358;
    if(ball.y+BALL_R>wallY){ball.vy=-Math.abs(ball.vy)*WALL_E;ball.vx=-Math.abs(ball.vx)-0.5;ball.y=wallY-BALL_R;}
  }

  // Bumper collisions — physics bounce + trigger answer check
  bumpers.forEach((b,i)=>{
    if(!b.word)return;
    const dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy);
    if(d<BALL_R+BUMP_R&&d>0.5){
      const ang=Math.atan2(dy,dx),ov=BALL_R+BUMP_R-d;
      ball.x+=Math.cos(ang)*ov;ball.y+=Math.sin(ang)*ov;
      const s=Math.hypot(ball.vx,ball.vy);
      ball.vx=Math.cos(ang)*s*BUMP_E;ball.vy=Math.sin(ang)*s*BUMP_E;
      if(b.cooldown===0){
        b.glow=1;b.cooldown=45;spawnBurst(b.x,b.y,b.color);
        hitBumper(i);
      }
    }
    if(b.cooldown>0)b.cooldown--;
    if(b.glow>0)b.glow=Math.max(0,b.glow-0.045);
    if(b.flash>0)b.flash=Math.max(0,b.flash-0.035);
  });

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;p.r=Math.max(0,p.r-.12);});
  particles=particles.filter(p=>p.life>0&&p.r>0);
  if(flashMsg){if(--flashMsg.timer<20)flashMsg.alpha=flashMsg.timer/20;if(flashMsg.timer<=0)flashMsg=null;}
}

/* ── DRAW ── */
function draw(){
  ctx.clearRect(0,0,CW,CH);

  // === SCORE PANEL ===
  const panGrad=ctx.createLinearGradient(0,0,0,SCORE_H);
  panGrad.addColorStop(0,'#1a0038');panGrad.addColorStop(1,'#0a0018');
  ctx.fillStyle=panGrad;ctx.fillRect(0,0,CW,SCORE_H);

  // Score label & value
  ctx.textBaseline='middle';
  ctx.font='11px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle='#6666aa';ctx.textAlign='left';
  ctx.fillText('SCORE',14,16);
  ctx.font='bold 28px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle='#F5A623';
  ctx.shadowColor='#F5A623';ctx.shadowBlur=10;
  ctx.fillText(score,14,42);ctx.shadowBlur=0;

  // Title center
  ctx.textAlign='center';
  ctx.font='bold 13px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('WORD PINBALL',CW/2,SCORE_H/2);

  // Ball indicators (right side)
  ctx.font='11px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle='#6666aa';ctx.textAlign='right';
  ctx.fillText('LIVES',CW-12,16);
  for(let i=0;i<3;i++){
    ctx.font='18px "Comic Sans MS","Chalkboard SE","Comic Neue"';
    ctx.fillStyle=i<ballsLeft?'#F5A623':'rgba(80,80,80,0.5)';
    ctx.textAlign='center';
    ctx.fillText('⚽',CW-12-i*22,40);
  }

  // Panel separator line with glow
  ctx.strokeStyle='rgba(245,166,35,0.7)';ctx.lineWidth=2;
  ctx.shadowColor='#F5A623';ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(0,SCORE_H);ctx.lineTo(CW,SCORE_H);ctx.stroke();
  ctx.shadowBlur=0;

  // Field background is the CSS bg-pinball.png image — canvas is transparent here

  // === DIAGONAL GUIDE WALLS ===
  ctx.lineCap='round';ctx.lineWidth=6;
  ctx.strokeStyle='#F5A623';ctx.shadowColor='#F5A623';ctx.shadowBlur=14;
  ctx.beginPath();ctx.moveTo(7,358);ctx.lineTo(FL_PIV.x,FL_PIV.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CW-7,358);ctx.lineTo(FR_PIV.x,FR_PIV.y);ctx.stroke();
  ctx.shadowBlur=0;

  // Drain arrows
  const dcx=(DRAIN_X1+DRAIN_X2)/2;
  ctx.strokeStyle='rgba(255,60,60,0.45)';ctx.lineWidth=2;ctx.shadowColor='#FF4444';ctx.shadowBlur=5;
  [376,386,396,406].forEach(y=>{
    ctx.beginPath();ctx.moveTo(dcx-7,y-5);ctx.lineTo(dcx,y+2);ctx.lineTo(dcx+7,y-5);ctx.stroke();
  });
  ctx.shadowBlur=0;

  // === FLIPPERS ===
  drawFlipper(FL_PIV,FL_TIP_REST,FL_TIP_ACT,flipL);
  drawFlipper(FR_PIV,FR_TIP_REST,FR_TIP_ACT,flipR);
  // Drain gap label
  ctx.font='bold 10px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle='rgba(255,60,60,0.4)';
  ctx.textAlign='center';ctx.fillText('DRAIN',dcx,428);

  // === ANSWER BUMPERS ===
  bumpers.forEach((b,i)=>{
    if(!b.word)return;
    const isFlash=b.flash>0;
    const glowAmt=isFlash?(30+b.flash*25):(b.glow>0?(12+b.glow*18):6);
    ctx.shadowColor=isFlash?b.flashCol:b.color;
    ctx.shadowBlur=glowAmt;

    // Outer glow ring
    if(b.glow>0||b.flash>0){
      const rg=ctx.createRadialGradient(b.x,b.y,BUMP_R*0.6,b.x,b.y,BUMP_R*1.7);
      const gcol=isFlash?b.flashCol:b.color;
      rg.addColorStop(0,gcol+(Math.round((isFlash?b.flash:b.glow)*80+20)).toString(16).padStart(2,'0'));
      rg.addColorStop(1,'transparent');
      ctx.globalAlpha=0.6;ctx.fillStyle=rg;
      ctx.beginPath();ctx.arc(b.x,b.y,BUMP_R*1.7,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }

    // Main circle body
    const col=isFlash?b.flashCol:b.color;
    ctx.globalAlpha=0.72+b.glow*0.28+(b.flash*0.2);
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(b.x,b.y,BUMP_R,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Circle border
    ctx.strokeStyle=col;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(b.x,b.y,BUMP_R,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;

    // Star spokes on the rim
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;
    for(let s=0;s<8;s++){
      const a=(s/8)*Math.PI*2;
      const r1=BUMP_R-7,r2=BUMP_R-1;
      ctx.beginPath();
      ctx.moveTo(b.x+Math.cos(a)*r1,b.y+Math.sin(a)*r1);
      ctx.lineTo(b.x+Math.cos(a)*r2,b.y+Math.sin(a)*r2);
      ctx.stroke();
    }
    // Centre star
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='13px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('★',b.x,b.y-14);

    // Answer word
    ctx.shadowColor=isFlash?b.flashCol:'transparent';ctx.shadowBlur=isFlash?12:0;
    ctx.fillStyle='white';ctx.textAlign='center';ctx.textBaseline='middle';
    const w=b.word,fs=w.length<=1?30:w.length<=3?24:w.length<=5?19:w.length<=7?14:11;
    ctx.font=`bold ${fs}px "Comic Sans MS","Chalkboard SE","Comic Neue"`;
    ctx.fillText(w,b.x,b.y+6);
    ctx.shadowBlur=0;

    // Flash ✓ or ✗ above bumper
    if(b.flash>0){
      ctx.globalAlpha=b.flash;ctx.font='bold 24px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.textAlign='center';
      ctx.shadowColor=b.flashCol;ctx.shadowBlur=15;
      ctx.fillStyle='white';ctx.fillText(b.isCorrect?'✓':'✗',b.x,b.y-BUMP_R-16);
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
  });

  // === BALL ===
  if(phase!=='over'){
    const bx=ball.x,by=ball.y;
    const bg=ctx.createRadialGradient(bx-3,by-3,1,bx,by,BALL_R);
    bg.addColorStop(0,'#ffffff');bg.addColorStop(0.45,'#dde0ff');bg.addColorStop(1,'#7788cc');
    ctx.shadowColor='rgba(160,180,255,0.8)';ctx.shadowBlur=18;
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.arc(bx,by,BALL_R,0,Math.PI*2);ctx.fill();
    // Shine spot
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.beginPath();ctx.arc(bx-3,by-3,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

    // Serving pulse ring
    if(phase==='serving'){
      const pulse=BALL_R+4+Math.sin(Date.now()/350)*5;
      ctx.strokeStyle='rgba(245,166,35,0.55)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bx,by,pulse,0,Math.PI*2);ctx.stroke();
    }
  }

  // === PARTICLES ===
  particles.forEach(p=>{
    ctx.globalAlpha=Math.min(1,p.life/14);ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // === FLASH MESSAGE ===
  if(flashMsg){
    ctx.globalAlpha=flashMsg.alpha;
    ctx.font='bold 21px "Comic Sans MS","Chalkboard SE","Comic Neue"';ctx.fillStyle=flashMsg.color;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=flashMsg.color;ctx.shadowBlur=18;
    ctx.fillText(flashMsg.text,CW/2,FIELD_TOP+50);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // === IDLE / SERVING PROMPT ===
  if(phase==='idle'||!catKey){
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 17px "Comic Sans MS","Chalkboard SE","Comic Neue"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('👆 Choose a category above!',CW/2,CH/2);
  }
  if(phase==='serving'&&catKey){
    ctx.fillStyle='rgba(180,180,255,0.55)';ctx.font='12px "Comic Sans MS","Chalkboard SE","Comic Neue"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Tap the correct answer bumper!',CW/2,FIELD_TOP+18);
  }
}

function drawFlipper(piv,tipRest,tipAct,active){
  const tip=active?tipAct:tipRest;
  ctx.lineCap='round';ctx.lineWidth=12;
  ctx.strokeStyle=active?'#FFD93D':'#F5A623';
  ctx.shadowColor=active?'#FFD93D':'#F5A623';
  ctx.shadowBlur=active?24:16;
  ctx.beginPath();ctx.moveTo(piv.x,piv.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
  ctx.shadowBlur=0;
  // Pivot ball
  ctx.fillStyle=active?'#fff':'#FFD93D';ctx.shadowColor='#F5A623';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(piv.x,piv.y,7,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

/* ── PARTICLES ── */
function spawnBurst(x,y,color){
  const cols=['#F5A623','#FFD93D','#ffffff',color];
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      r:2.5+Math.random()*3,color:cols[i%cols.length],life:14+Math.random()*10|0});
  }
}
function smallConfetti(){
  const cols=['#F5A623','#3A8EF6','#6BCB77','#FF6B6B','#B45CFF'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');p.className='cf';
    p.style.cssText=`left:${25+Math.random()*50}vw;top:-8px;background:${cols[i%cols.length]};`+
      `width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;`+
      `animation-duration:${1+Math.random()*1.2}s;`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function launchConfetti(){
  const cols=['#F5A623','#3A8EF6','#6BCB77','#FF6B6B','#B45CFF','#FFD93D'];
  for(let i=0;i<75;i++)setTimeout(()=>{
    const p=document.createElement('div');p.className='cf';
    p.style.cssText=`left:${Math.random()*100}vw;top:-8px;background:${cols[i%cols.length]};`+
      `width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`+
      `animation-duration:${1.5+Math.random()*2}s;`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  },i*28);
}

/* ── LOOP ── */
function loop(){
  raf=requestAnimationFrame(loop);
  if(phase==='playing'||phase==='draining')updatePhysics();
  draw();
}

/* ── CANVAS INPUT — launch only (answers handled by HTML buttons below) ── */
canvas.addEventListener('click',e=>{if(phase==='serving')launch();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(phase==='serving')launch();},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('touchcancel',e=>{e.preventDefault();},{passive:false});

/* ── KEYBOARD → launch only ── */
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='ArrowUp')&&phase==='serving'){launch();e.preventDefault();}
});

/* ── BUTTONS ── */
document.getElementById('btnLaunch').addEventListener('click',launch);
document.querySelectorAll('.btn-cat').forEach(btn=>{
  btn.addEventListener('click',()=>{_overFired=false;selectCat(btn.dataset.key);});
});
document.getElementById('btnReplay').addEventListener('click',()=>{
  document.getElementById('gameOverlay').classList.add('hidden');
  if(catKey)startGame();
});

// Bumper overlay buttons
for(let i=0;i<4;i++){
  const bov=document.getElementById('bov'+i);
  if(!bov)continue;
  bov.addEventListener('click',(function(idx){return function(e){e.stopPropagation();tapAnswerBtn(idx);};})(i));
  bov.addEventListener('touchstart',(function(idx){return function(e){e.preventDefault();e.stopPropagation();tapAnswerBtn(idx);};})(i),{passive:false});
}
document.getElementById('btnMute').addEventListener('click',()=>{
  _muted=!_muted;
  const b=document.getElementById('btnMute');
  b.textContent=_muted?'🔇':'🔊';b.classList.toggle('muted',_muted);
  if(_muted&&window.speechSynthesis)window.speechSynthesis.cancel();
});

/* ── URL PARAM ── */
const _p=new URLSearchParams(location.search).get('cat');
if(_p&&URL_MAP[_p.toLowerCase()]){
  setTimeout(()=>{selectCat(URL_MAP[_p.toLowerCase()]);},120);
}else{
  raf=requestAnimationFrame(loop);
}
</script>
