<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Sound Match | Learn to Read Games</title>
  <style>
    :root {
      --green:  #6BCB77;
      --teal:   #27AE60;
      --yellow: #FFD93D;
      --coral:  #FF6B6B;
      --blue:   #3A8EF6;
      --bg:     #F0FFF4;
      --text:   #2C3E50;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Comic Sans MS', 'Comic Neue'; background:url('icons/bg-default.png') center/cover no-repeat fixed,var(--bg); color:var(--text); height:100vh;height:100dvh;overflow:hidden; display:flex; flex-direction:column; }

    header { background:linear-gradient(135deg,#27AE60 0%,#6BCB77 100%); padding:.4rem .8rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:nowrap; gap:.5rem; }
    header h1 { font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.6rem; color:white; text-shadow:0 2px 6px rgba(0,0,0,.2); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .header-btns { display:flex; gap:.5rem; align-items:center; flex-wrap:nowrap; flex-shrink:0; }
    .btn-header { background:rgba(255,255,255,.2); color:white; border:none; font-family: 'Comic Sans MS', 'Comic Neue'; font-weight:700; font-size:.85rem; padding:6px 16px; border-radius:999px; cursor:pointer; transition:background .2s; text-decoration:none; display:inline-block; }
    .btn-header:hover { background:rgba(255,255,255,.35); }
    .btn-mute { background:rgba(255,255,255,.2); color:white; border:none; font-size:1.15rem; width:34px; height:34px; border-radius:999px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
    .btn-mute:hover { background:rgba(255,255,255,.35); }
    .btn-mute.muted { background:rgba(255,100,100,.35); }
    .voice-group { display:flex; gap:4px; }
    .btn-voice { background:rgba(255,255,255,.15); color:rgba(255,255,255,.8); border:2px solid rgba(255,255,255,.2); font-family: 'Comic Sans MS', 'Comic Neue'; font-weight:700; font-size:.78rem; padding:4px 12px; border-radius:999px; cursor:pointer; transition:background .2s; white-space:nowrap; }
    .btn-voice.active { background:rgba(255,255,255,.9); color:#27AE60; border-color:transparent; }

    /* progress */
    .progress-wrap { background:white; padding:.25rem .8rem; border-bottom:2px solid #C8F0D4; }
    .progress-outer { background:#D4F0DC; border-radius:999px; height:12px; overflow:hidden; max-width:600px; margin:0 auto; }
    .progress-inner { background:linear-gradient(90deg,#27AE60,#6BCB77); height:100%; border-radius:999px; transition:width .5s ease; }
    .progress-text { text-align:center; font-size:.8rem; font-weight:800; color:#888; margin-top:4px; }

    /* main */
    main { flex:1; min-height:0; overflow:hidden; max-width:660px; margin:0 auto; width:100%; padding:.3rem 1rem; display:flex; flex-direction:column; align-items:center; gap:.5rem; }

    .score-chip { background:white; border-radius:12px; padding:.4rem 1.2rem; font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.05rem; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .score-chip span { color:#27AE60; }

    /* letter display */
    .letter-card { background:linear-gradient(135deg,#27AE60,#6BCB77); border-radius:24px; padding:.6rem 1.5rem; display:flex; align-items:center; gap:1rem; box-shadow:0 8px 30px rgba(39,174,96,.35); }
    .letter-upper { font-family:'Comic Sans MS','Comic Neue','Comic Sans'; font-size:5rem; color:white; line-height:1; text-shadow:0 3px 10px rgba(0,0,0,.2); }
    .letter-divider { width:3px; height:56px; background:rgba(255,255,255,.35); border-radius:2px; }
    .letter-lower { font-family:'Comic Sans MS','Comic Neue','Comic Sans'; font-size:3.5rem; color:rgba(255,255,255,.8); line-height:1; }
    .btn-replay { background:rgba(255,255,255,.25); border:none; color:white; font-size:1.4rem; width:44px; height:44px; border-radius:999px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; margin-left:.25rem; }
    .btn-replay:hover { background:rgba(255,255,255,.4); }

    .question-text { font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.35rem; color:var(--text); text-align:center; }

    /* options */
    .options-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.9rem; width:100%; max-width:480px; }
    .option-card { background:white; border-radius:20px; padding:.5rem .5rem; display:flex; flex-direction:column; align-items:center; gap:.3rem; cursor:pointer; border:3px solid transparent; box-shadow:0 4px 16px rgba(0,0,0,.07); transition:transform .15s,box-shadow .15s,border-color .15s; user-select:none; }
    .option-card:hover { transform:translateY(-5px); box-shadow:0 10px 24px rgba(0,0,0,.12); border-color:#27AE60; }
    .option-pic  { font-size:3.2rem; line-height:1.1; display:flex; align-items:center; justify-content:center; }
    .option-pic img { width:7rem; height:7rem; object-fit:contain; border-radius:8px; }
    .option-word { display:none; }
    .option-card.correct { border-color:#27AE60; background:#F0FFF4; animation:bounce .4s ease; }
    .option-card.wrong   { border-color:#FF6B6B; background:#FFF5F5; animation:shake  .4s ease; }
    .option-card.disabled { opacity:.45; pointer-events:none; }

    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes shake  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    .feedback { font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.15rem; text-align:center; min-height:1.6em; }
    .feedback.good { color:#27AE60; }
    .feedback.bad  { color:#FF6B6B; }

    /* overlay */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:100; align-items:center; justify-content:center; padding:1rem; }
    .overlay.active { display:flex; }
    .overlay-box { background:white; border-radius:24px; padding:2.5rem 2rem; max-width:380px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.3); animation:popIn .4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
    .overlay-emoji { font-size:4rem; margin-bottom:.5rem; }
    .overlay-title { font-family: 'Comic Sans MS', 'Comic Neue'; font-size:2rem; color:#27AE60; margin-bottom:.4rem; }
    .overlay-score { font-size:1.05rem; font-weight:700; color:#555; margin-bottom:1.4rem; }
    .overlay-score span { color:#27AE60; font-size:1.3rem; }
    .btn-play-again { font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.15rem; background:linear-gradient(135deg,#27AE60,#6BCB77); color:white; border:none; padding:13px 38px; border-radius:999px; cursor:pointer; box-shadow:0 6px 20px rgba(39,174,96,.4); transition:transform .15s; }
    .btn-play-again:hover { transform:scale(1.05); }

    .confetti-piece { position:fixed; border-radius:2px; animation:fall linear forwards; pointer-events:none; z-index:300; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

    @media(max-width:480px) {
      .letter-upper{font-size:4rem} .letter-lower{font-size:3rem} .option-pic img{width:5.5rem;height:5.5rem}
      header h1{font-size:1.25rem}
    }
    @media(max-height:680px) {
      .letter-card{padding:.3rem .9rem;} .letter-upper{font-size:3rem} .letter-lower{font-size:2.2rem}
      .letter-divider{height:40px} .option-pic img{width:4.5rem;height:4.5rem}
      .options-grid{gap:.5rem} .score-chip{padding:.25rem .8rem;font-size:.9rem}
      main{gap:.3rem; padding:.2rem .8rem;}
    }
@media (max-height: 580px) {
  .option-pic img { width: 3.5rem !important; height: 3.5rem !important; }
  .options-grid { gap: .3rem; }
  main { gap: .25rem; padding: .15rem .8rem; }
  .score-chip { font-size: .78rem; padding: 3px 10px; }
  .letter-card { padding: .3rem .6rem; }
  .question-text { font-size: .85rem; }
  .feedback { min-height: 1rem; font-size: .9rem; }
}
  </style>
<link href="fonts.css?v=3" rel="stylesheet"><script src="tts.js?v=7" defer></script>
</head>
<body>

<header>
  <h1>🖼️ Letter Sound Match</h1>
  <div class="header-btns">
    <button class="btn-mute" id="btnMute">🔊</button>
    <button class="btn-voice" id="btnVoice0" aria-label="Read word aloud">👩 Voice</button>
    <button class="btn-header" id="btnNew">New Game</button>
    <a href="hub.html" class="btn-header">← Games</a>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-outer"><div class="progress-inner" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">Question 1 of 26</div>
</div>

<main>
  <div class="score-chip">⭐ Score: <span id="scoreVal">0</span> / 26</div>

  <div class="letter-card">
    <div class="letter-upper" id="letterUpper">A</div>
    <div class="letter-divider"></div>
    <div class="letter-lower" id="letterLower">a</div>
    <button class="btn-replay" id="btnReplay" title="Hear again">🔊</button>
  </div>

  <div class="question-text" id="questionText">Which picture starts with A?</div>
  <div class="options-grid" id="optionsGrid"></div>
  <div class="feedback" id="feedback"></div>
</main>

<div class="overlay" id="doneOverlay">
  <div class="overlay-box">
    <div class="overlay-emoji" id="doneEmoji">🎉</div>
    <div class="overlay-title" id="doneTitle">Well Done!</div>
    <div class="overlay-score" id="doneScore"></div>
    <button class="btn-play-again" id="btnPlayAgain">Play Again!</button>
  </div>
</div>

<script>
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const CARD_DATA = {
  A:{pic:'icons/pic-a.png',word:'Apple'},    B:{pic:'icons/pic-b.png',word:'Ball'},
  C:{pic:'icons/pic-c.png',word:'Cat'},      D:{pic:'icons/pic-d.png',word:'Dog'},
  E:{pic:'icons/pic-e.png',word:'Elephant'}, F:{pic:'icons/pic-f.png',word:'Fish'},
  G:{pic:'icons/pic-g.png',word:'Goat'},     H:{pic:'icons/pic-h.png',word:'Hat'},
  I:{pic:'icons/pic-i.png',word:'Igloo'},    J:{pic:'icons/pic-j.png',word:'Jar'},
  K:{pic:'icons/pic-k.png',word:'Kite'},     L:{pic:'icons/pic-l.png',word:'Lamp'},
  M:{pic:'icons/pic-m.png',word:'Mug'},      N:{pic:'icons/pic-n.png',word:'Nest'},
  O:{pic:'icons/pic-o.png',word:'Octopus'},  P:{pic:'icons/pic-p.png',word:'Pig'},
  Q:{pic:'icons/pic-q.png',word:'Queen'},    R:{pic:'icons/pic-r.png',word:'Rainbow'},
  S:{pic:'icons/pic-s.png',word:'Sun'},      T:{pic:'icons/pic-t.png',word:'Tree'},
  U:{pic:'icons/pic-u.png',word:'Umbrella'}, V:{pic:'icons/pic-v.png',word:'Violin'},
  W:{pic:'icons/pic-w.png',word:'Watch'},    X:{pic:'icons/pic-x.png',word:'Xylophone'},
  Y:{pic:'icons/pic-y.png',word:'Yo-yo'},    Z:{pic:'icons/pic-z.png',word:'Zebra'},
};

// ── SPEECH ─────────────────────────────────────────
let _muted=false, _speaking=false, _pending=null, _queue=[], _voices=[], _voiceIndex=0;

function loadVoices() {
  const all = window.speechSynthesis.getVoices();
  if (!all.length) return;
  const en=all.filter(v=>/^en/i.test(v.lang));
  const best=en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))
    ||en.find(v=>/\b(jenny|emma)\b/i.test(v.name)&&/natural/i.test(v.name))
    ||en.find(v=>/female/i.test(v.name))
    ||en.find(v=>/\b(samantha|karen|moira|serena|victoria|tessa|fiona|kate|zoe|allison|ava|zira|eva|hazel|susan)\b/i.test(v.name))
    ||en.find(v=>/natural|neural|online/i.test(v.name))
    ||en.find(v=>/google.*english/i.test(v.name))
    ||en[0]||all[0];
  _voices = [best];
}
if (window.speechSynthesis) { window.speechSynthesis.addEventListener("voiceschanged", loadVoices); loadVoices(); }

function speak(text) {
  if (!window.speechSynthesis||_muted) return;
  const clean=text.replace(/<[^>]+>/g,'').replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|️|⃣/gu,'').replace(/\s+/g,' ').trim();
  if (!clean) return;
  if (_speaking||_queue.length) { _pending=clean; _queue=[]; return; }
  _doSpeak(clean);
}
function _doSpeak(text) {
  _queue=text.replace(/([.!?])\s+/g,'$1\n').split('\n').map(s=>s.trim()).filter(Boolean);
  _pending=null; _next();
}
function _next() {
  if (!_queue.length) { _speaking=false; if(_pending){const t=_pending;_pending=null;_doSpeak(t);} return; }
  _speaking=true;
  const utt=new SpeechSynthesisUtterance(_queue.shift());
  if (_voices[_voiceIndex]) utt.voice=_voices[_voiceIndex];
  utt.rate=0.92; utt.pitch=1.0;
  utt.onend=()=>{ _speaking=false; setTimeout(_next,350); };
  window.speechSynthesis.speak(utt);
}

// ── GAME STATE ─────────────────────────────────────
let gs = { queue:[], idx:0, score:0, answered:false };

function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame() {
  gs = { queue:shuffle(ALPHABET.split('')), idx:0, score:0, answered:false };
  document.getElementById('doneOverlay').classList.remove('active');
  showQ();
}

function showQ() {
  const L = gs.queue[gs.idx];
  const opts = shuffle([L, ...shuffle(ALPHABET.split('').filter(x=>x!==L)).slice(0,3)]);

  document.getElementById('letterUpper').textContent = L;
  document.getElementById('letterLower').textContent = L.toLowerCase();
  document.getElementById('questionText').textContent = `Which picture starts with ${L}?`;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('progressBar').style.width = (gs.idx/26*100)+'%';
  document.getElementById('progressText').textContent = `Question ${gs.idx+1} of 26`;
  document.getElementById('scoreVal').textContent = gs.score;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  opts.forEach(opt => {
    const d = CARD_DATA[opt];
    const el = document.createElement('div');
    el.className = 'option-card';
    el.innerHTML = `<span class="option-pic"><img src="${d.pic}" alt="${d.word}"></span><div class="option-word">${d.word}</div>`;
    el.addEventListener('click', () => pick(opt, el));
    grid.appendChild(el);
  });

  speak(`Which picture starts with ${L}?`);
}

function pick(chosen, el) {
  if (gs.answered) return;
  gs.answered = true;
  const correct = gs.queue[gs.idx];
  document.querySelectorAll('.option-card').forEach(c=>c.classList.add('disabled'));

  if (chosen === correct) {
    gs.score++;
    el.classList.remove('disabled'); el.classList.add('correct');
    document.getElementById('feedback').textContent = `✅ Yes! ${correct} is for ${CARD_DATA[correct].word}!`;
    document.getElementById('feedback').className = 'feedback good';
    speak(`${CARD_DATA[correct].word}! Great job!`);
    confetti();
    setTimeout(() => { gs.idx++; gs.answered=false; gs.idx>=26 ? finish() : showQ(); }, 1800);
  } else {
    el.classList.remove('disabled'); el.classList.add('wrong');
    document.getElementById('feedback').textContent = `❌ Try again!`;
    document.getElementById('feedback').className = 'feedback bad';
    speak(`Hmm, try again! Which picture starts with ${correct}?`);
    setTimeout(() => {
      document.querySelectorAll('.option-card').forEach(c=>c.classList.remove('disabled','wrong'));
      gs.answered=false;
    }, 1100);
  }
}

function finish() {
  const s=gs.score;
  document.getElementById('doneEmoji').textContent = s>=22?'🏆':s>=15?'🌟':'💪';
  document.getElementById('doneTitle').textContent = s>=22?'Amazing!':s>=15?'Great Job!':'Keep Practicing!';
  document.getElementById('doneScore').innerHTML = `You got <span>${s}</span> out of 26 correct!`;
  document.getElementById('doneOverlay').classList.add('active');
  speak(s>=22?`Amazing! You got ${s} out of 26! You are a superstar!`:`Great job! You got ${s} out of 26! Keep practicing!`);
  if (s>=15) confetti();
}

function confetti() {
  const cols=['#3A8EF6','#FF6B6B','#FFD93D','#6BCB77','#6B48FF','#FF8E53'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.5}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── EVENTS ─────────────────────────────────────────
document.getElementById('btnNew').addEventListener('click', startGame);
document.getElementById('btnPlayAgain').addEventListener('click', startGame);
document.getElementById('btnReplay').addEventListener('click', () => {
  const L=gs.queue[gs.idx]; speak(`${L}. ${L.toLowerCase()}.`);
});
document.getElementById('btnMute').addEventListener('click', () => {
  _muted=!_muted;
  const b=document.getElementById('btnMute');
  b.textContent=_muted?'🔇':'🔊'; b.classList.toggle('muted',_muted);
  if(_muted){_queue=[];_pending=null;window.speechSynthesis.cancel();_speaking=false;}
});

startGame();
</script>
  <script src="site-nav.js?v=5"></script>
</body>
</html>
