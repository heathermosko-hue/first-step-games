<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Family Builder | First Step Reading</title>
  <style>
    :root { --bg:#FFF8F0; --text:#2C3E50; --orange:#E67E22; --amber:#F39C12; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Comic Sans MS', 'Comic Neue'; background:url('icons/bg-default.png') center/cover no-repeat fixed,var(--bg); color:var(--text); height:100vh;height:100dvh;overflow:hidden; display:flex; flex-direction:column; }

    header { background:linear-gradient(135deg,#E67E22 0%,#F39C12 100%); padding:.5rem 1rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .back-link { color:white; text-decoration:none; font-weight:700; font-size:.9rem; background:rgba(255,255,255,.2); padding:6px 14px; border-radius:999px; white-space:nowrap; transition:background .2s; }
    .back-link:hover { background:rgba(255,255,255,.35); }
    header h1 { font-family: 'Comic Sans MS', 'Comic Neue'; color:white; font-size:clamp(1.1rem,3.5vw,1.8rem); flex:1; text-align:center; }
    .header-btns { display:flex; gap:.45rem; align-items:center; }
    .btn-header { background:rgba(255,255,255,.2); border:none; color:white; font-family: 'Comic Sans MS', 'Comic Neue'; font-weight:700; font-size:.82rem; padding:5px 11px; border-radius:999px; cursor:pointer; transition:background .2s; white-space:nowrap; }
    .btn-header:hover { background:rgba(255,255,255,.35); }
    .btn-header.muted { background:rgba(255,80,80,.45); }

    .settings-bar { background:white; border-bottom:2px solid #FFE5C8; padding:.3rem .8rem; display:flex; align-items:center; gap:.75rem 1.25rem; flex-wrap:nowrap; justify-content:center; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .settings-label { font-size:.75rem; font-weight:800; color:#bbb; text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .cat-btns { display:flex; gap:.3rem; flex-wrap:nowrap; justify-content:center; }
    .btn-cat { background:#FFF0DC; color:#E67E22; border:2px solid transparent; font-family: 'Comic Sans MS', 'Comic Neue'; font-weight:700; font-size:.82rem; padding:5px 13px; border-radius:999px; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .btn-cat:hover { background:#FFD9A8; }
    .btn-cat.active { background:#E67E22; color:white; border-color:#E67E22; }

    main { flex:1; min-height:0; overflow:hidden; overflow-x:hidden; display:flex; flex-direction:column; align-items:center; padding:.3rem .6rem .4rem; gap:.35rem; }

    .score-row { display:flex; gap:1.5rem; font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1rem; color:#bbb; }
    .score-row span { color:#E67E22; font-size:1.2rem; }

    .progress-bar { width:100%; max-width:480px; height:8px; background:#FFE5C8; border-radius:999px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#E67E22,#F39C12); border-radius:999px; transition:width .4s; }

    .game-card {
      background:white; border-radius:24px; padding:.75rem 1rem;
      box-shadow:0 4px 24px rgba(230,126,34,.12); border:3px solid #FFE5C8;
      display:flex; flex-direction:column; align-items:center; gap:.5rem;
      width:100%; max-width:460px;
    }

    .emoji-display { font-size:clamp(2.8rem,11vw,5rem); line-height:1; filter:drop-shadow(0 3px 6px rgba(0,0,0,.1)); }

    .word-show {
      font-family:'Comic Sans MS','Comic Neue','Comic Sans';
      font-size:clamp(3rem,12vw,5.5rem); line-height:1;
      display:flex; align-items:baseline;
    }
    .word-blank {
      display:inline-block; color:#FFD9A8; border-bottom:5px solid #F39C12;
      min-width:.65em; text-align:center; transition:color .3s, border-color .3s;
    }
    .word-blank.filled { color:#27AE60; border-color:#27AE60; }
    .word-end-part { color:#E67E22; }

    .family-tag {
      background:#FFF0DC; color:#E67E22; font-family: 'Comic Sans MS', 'Comic Neue';
      font-size:.9rem; padding:3px 14px; border-radius:999px;
    }

    .feedback {
      font-family: 'Comic Sans MS', 'Comic Neue'; font-size:1.3rem; min-height:1.7rem; text-align:center;
    }
    .feedback.ok { color:#27AE60; }
    .feedback.err { color:#E74C3C; }

    .choices { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; width:100%; max-width:340px; }
    .btn-choice {
      background:white; border:3px solid #FFE5C8; color:#E67E22;
      font-family:'Comic Sans MS','Comic Neue','Comic Sans';
      font-size:clamp(2rem,8vw,3rem); padding:.6rem; border-radius:16px;
      cursor:pointer; transition:all .15s;
      box-shadow:0 3px 10px rgba(230,126,34,.1);
    }
    .btn-choice:hover:not(:disabled) { background:#FFF0DC; transform:translateY(-2px); box-shadow:0 6px 18px rgba(230,126,34,.2); }
    .btn-choice.correct { background:#27AE60; border-color:#27AE60; color:white; }
    .btn-choice.wrong { background:#E74C3C; border-color:#E74C3C; color:white; animation:shake .4s; }
    .btn-choice:disabled { cursor:default; }

    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)}
    }

    @media(max-height:680px){
      .game-card{padding:.4rem .7rem;gap:.3rem}
      .emoji-display{font-size:clamp(2rem,8vw,3.5rem)}
      .word-show{font-size:clamp(2rem,8vw,3.5rem)}
      .feedback{min-height:1.2rem;font-size:1.1rem}
    }
  @media (max-height: 680px) {
  .word-show { font-size: clamp(1.8rem,8vw,2.8rem) !important; }
  .choices { gap: .4rem !important; }
  .btn-choice { font-size: clamp(1.2rem,5vw,1.8rem) !important; padding: .45rem .3rem !important; }
  .settings-bar { padding: .12rem .6rem; }
}
@media (max-height: 560px) {
  .word-show { font-size: clamp(1.4rem,6vw,2rem) !important; }
  .emoji-display { font-size: clamp(1.6rem,7vw,2.5rem) !important; }
  header { padding: .2rem .6rem; }
  header h1 { font-size: .95rem; }
  main { gap: .18rem; padding: .15rem .5rem .2rem; }
}

<body>

<header>
  <a href="hub.html" class="back-link">&#8592; Games</a>
  <h1>Word Family Builder</h1>
  <div class="header-btns">
    <button class="btn-header" id="btnMute">&#128266;</button>
    <button class="btn-header" id="btnVoice" aria-label="Read word aloud">&#128105; Voice</button>
  </div>
</header>

<div class="settings-bar">
  <span class="settings-label">Vowel:</span>
  <div class="cat-btns">
    <button class="btn-cat active" data-cat="Short A">Short A</button>
    <button class="btn-cat" data-cat="Short E">Short E</button>
    <button class="btn-cat" data-cat="Short I">Short I</button>
    <button class="btn-cat" data-cat="Short O">Short O</button>
    <button class="btn-cat" data-cat="Short U">Short U</button>
  </div>
</div>

<main>
  <div class="score-row">
    <div>Score: <span id="scoreVal">0</span></div>
    <div>Word <span id="qNum">1</span> of <span id="qTotal">?</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="game-card">
    <div class="emoji-display" id="emojiDisplay">&#127825;</div>
    <div class="word-show">
      <span class="word-blank" id="wordBlank">_</span><span class="word-end-part" id="wordEnd">at</span>
    </div>
    <div class="family-tag" id="familyTag">_at family</div>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="choices" id="choices"></div>
</main>

<script>
/* ── SPEECH ── */
let _muted = false, _speaking = false, _pending = null, _queue = [], _voice = null;
function _launch(msg) {
  if (_muted) return;
  window.speechSynthesis.cancel();
  _queue = msg.split(' | '); _speaking = false; _advance();
}
function _advance() {
  if (!_queue.length) { _speaking=false; if (_pending){const t=_pending;_pending=null;_launch(t);} return; }
  _speaking = true;
  const utt = new SpeechSynthesisUtterance(_queue.shift());
  if (_voice) utt.voice = _voice;
  utt.rate = 0.92; utt.pitch = 1.0;
  utt.onend = () => { _speaking=false; setTimeout(_advance,350); };
  window.speechSynthesis.speak(utt);
}
function speak(msg) { if (_muted) return; if (_speaking){_pending=msg;} else {_launch(msg);} }
function loadVoice(){
  const all=window.speechSynthesis.getVoices();
  if(!all.length){setTimeout(loadVoice,250);return;}
  const en=all.filter(v=>/^en/i.test(v.lang));_voice=en.find(v=>/aria/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/\b(jenny|emma)\b/i.test(v.name)&&/natural/i.test(v.name))||en.find(v=>/female/i.test(v.name))||en.find(v=>/\b(samantha|karen|moira|serena|victoria|tessa|fiona|kate|zoe|allison|ava|zira|eva|hazel|susan)\b/i.test(v.name))||en.find(v=>/natural|neural|online/i.test(v.name))||en.find(v=>/google.*english/i.test(v.name))||en[0]||all[0];
}
window.speechSynthesis.addEventListener("voiceschanged", loadVoice);loadVoice();

document.getElementById('btnMute').addEventListener('click', () => {
  _muted = !_muted;
  document.getElementById('btnMute').textContent = _muted ? '🔇' : '🔊';
  document.getElementById('btnMute').classList.toggle('muted', _muted);
  if (_muted) window.speechSynthesis.cancel();
});
document.getElementById('btnVoice').addEventListener('click', () => {
  const voices = window.speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.startsWith('en'));
  if (!voices.length) return;
  const idx = voices.indexOf(_voice);
  _voice = voices[(idx+1) % voices.length];
  speak(`Hello! My name is ${_voice.name.split(' ')[0]}!`);
});

};

/* ── GAME STATE ── */
let currentCat = 'Short A';
let questions = [], qIdx = 0, score = 0, locked = false;

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function buildQuestions(cat) {
  const group = WORD_GROUPS[cat];
  const qs = [];
  group.families.forEach(f => f.words.forEach(w => qs.push({...w, family: f.family})));
  return shuffle(qs);
}

function getChoices(correct, allLetters) {
  const pool = allLetters.filter(l => l !== correct);
  shuffle(pool);
  return shuffle([correct, ...pool.slice(0,3)]);
}

function startGame(cat) {
  currentCat = cat;
  questions = buildQuestions(cat);
  qIdx = 0; score = 0;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('qTotal').textContent = questions.length;
  document.querySelectorAll('.btn-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  showQuestion();
}

function showQuestion() {
  locked = false;
  const q = questions[qIdx];
  const ed = document.getElementById('emojiDisplay');
  if (q.img) { ed.innerHTML = q.img; } else { ed.textContent = q.emoji; }
  const blank = document.getElementById('wordBlank');
  blank.textContent = '_';
  blank.className = 'word-blank';
  document.getElementById('wordEnd').textContent = q.family;
  document.getElementById('familyTag').textContent = `_${q.family} family`;
  document.getElementById('qNum').textContent = qIdx + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('progressFill').style.width = (qIdx / questions.length * 100) + '%';

  const choices = getChoices(q.letter, WORD_GROUPS[currentCat].letters);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'btn-choice';
    btn.textContent = letter;
    btn.addEventListener('click', () => checkAnswer(letter, btn));
    choicesEl.appendChild(btn);
  });
  speak(`What letter starts the word ${q.word}? | ${q.word}!`);
}

function checkAnswer(letter, btn) {
  if (locked) return;
  const q = questions[qIdx];
  if (letter === q.letter) {
    locked = true;
    btn.classList.add('correct');
    document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);
    const blank = document.getElementById('wordBlank');
    blank.textContent = letter;
    blank.classList.add('filled');
    document.getElementById('feedback').textContent = q.word.toUpperCase() + '! Great job! 🎉';
    document.getElementById('feedback').className = 'feedback ok';
    score++;
    document.getElementById('scoreVal').textContent = score;
    speak(`${q.word}! | Great job! | ${q.word} starts with the letter ${letter}!`);
    setTimeout(advance, 1700);
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = 'Try again!';
    document.getElementById('feedback').className = 'feedback err';
    speak('Try again!');
    setTimeout(() => {
      btn.classList.remove('wrong');
      btn.disabled = true;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
    }, 900);
  }
}

function advance() {
  qIdx++;
  if (qIdx >= questions.length) { showGameOver(); } else { showQuestion(); }
}

function showGameOver() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('emojiDisplay').textContent = '🎉';
  document.getElementById('wordBlank').textContent = '';
  document.getElementById('wordEnd').textContent = '';
  document.getElementById('familyTag').textContent = 'Game Over!';
  document.getElementById('feedback').textContent = `You got ${score} of ${questions.length}! Amazing!`;
  document.getElementById('feedback').className = 'feedback ok';
  const btn = document.createElement('button');
  btn.className = 'btn-choice';
  btn.style.cssText = "grid-column:1/-1;font-family:'Comic Sans MS','Comic Neue';font-size:1.1rem;";
  btn.textContent = 'Play Again! 🔄';
  btn.addEventListener('click', () => startGame(currentCat));
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choicesEl.appendChild(btn);
  speak(`Amazing! You got ${score} out of ${questions.length} words correct!`);
}

document.querySelectorAll('.btn-cat').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.cat));
});
startGame('Short A');
</script>
