<title>Reading Homework Worksheets</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Comic Sans MS","Comic Sans",cursive;background:#f0f4f8;color:#000}
.toolbar{background:#1a237e;color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.toolbar label{font-size:.9rem;font-weight:bold}
.toolbar select{font-size:.9rem;padding:4px 8px;border-radius:6px;border:none;cursor:pointer;max-width:260px}
.tbtn{font-size:.9rem;padding:6px 16px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;background:#fff;color:#1a237e}
.tbtn:hover{background:#e8eaf6}
.home-a{color:#aacfff;font-size:.85rem;margin-left:auto;text-decoration:none}
#ws{max-width:8.2in;margin:24px auto;padding:0 10px}
/* === Sheet base === */
.sheet{background:#fff;padding:.6in .55in;margin-bottom:32px;border:1px solid #ccc;box-shadow:0 2px 10px #0002}
/* --- Comp page --- */
.name-row{display:flex;align-items:flex-end;gap:8px;font-size:.8rem;margin-bottom:16px}
.name-row .nl{flex:1;border-bottom:1.5px solid #000;height:20px;min-width:130px}
.name-row .nl2{border-bottom:1.5px solid #000;height:20px;min-width:90px}
.ch-bar{display:flex;align-items:center;gap:10px;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:14px}
.ch-em{font-size:2.6rem;line-height:1;flex-shrink:0}
.ch-titles .bk-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#555;margin-bottom:2px}
.ch-titles h2{font-size:1.25rem;font-weight:900;line-height:1.1}
.story-box{border:2px solid #000;border-radius:6px;padding:10px 14px;margin-bottom:14px;font-size:.95rem;line-height:1.65}
.story-box p{margin:0 0 3px}
.q-head{font-size:.9rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:10px}
.q-box{margin-bottom:10px;border:1.5px solid #999;border-radius:6px;padding:7px 11px}
.q-txt{font-size:.93rem;margin-bottom:5px;line-height:1.4}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid #000;vertical-align:bottom;margin:0 3px;height:17px}
.choices{display:flex;gap:10px;align-items:center}
.choice{border:2px solid #000;border-radius:20px;padding:2px 15px;font-size:.9rem;font-weight:bold}
.wf-box{margin-top:14px;border:2px dashed #aaa;border-radius:6px;padding:7px 11px}
.wf-head{font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;color:#333}
.word-grid{display:flex;flex-wrap:wrap;gap:5px}
.wchip{border:1.5px solid #000;border-radius:4px;padding:2px 9px;font-size:.88rem;font-weight:bold}
/* --- Sight words page --- */
.sw-bar{text-align:center;font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;border:3px solid #000;padding:5px;margin-bottom:14px}
.sec-hdr{font-size:.82rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #000;margin:12px 0 7px;padding-bottom:3px}
.trace-grid{display:flex;flex-wrap:wrap;gap:4px 22px}
.trace-item{display:flex;flex-direction:column;align-items:stretch;min-width:120px}
.tword{font-size:2rem;font-weight:900;color:#ccc;letter-spacing:.04em;line-height:1.1;font-family:"Comic Sans MS","Comic Sans",cursive}
/* Kindergarten 3-line ruling */
.kline{position:relative;height:52px;width:100%;border-top:2px solid #000;border-bottom:2px solid #000;margin-top:4px;margin-bottom:8px}
.kline::after{content:'';position:absolute;top:calc(50% - 1px);left:0;right:0;border-top:1.5px dashed #aaa}
.sw-key{font-size:.88rem;font-weight:bold;margin-bottom:7px;display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.sw-key-word{border:2px solid #000;border-radius:14px;padding:1px 10px;font-size:.88rem;font-weight:900}
.find-grid{display:flex;flex-wrap:wrap;gap:5px}
.bubble{width:64px;height:36px;border:2px solid #000;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold}
.write-grid{display:flex;flex-wrap:wrap;gap:4px 20px}
.write-item{min-width:160px;margin-bottom:4px}
.write-lbl{font-size:.85rem;font-weight:900;margin-bottom:0}
@media print{
  .toolbar{display:none!important}
  body{background:#fff}
  #ws{margin:0;padding:0;max-width:none}
  .sheet{box-shadow:none;border:none;margin:0;padding:.45in .5in;page-break-after:always}
  .sheet:last-child{page-break-after:auto}
}
</style>

function getBookChs(bk){return Object.keys(CH).filter(k=>k.startsWith(bk+'-')).sort((a,b)=>parseInt(a.split('-')[1])-parseInt(b.split('-')[1]));}

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function buildComp(d){
  const qs=d.q.map(([q,a,b])=>`<div class="q-box"><div class="q-txt">${q.replace('_____','<span class="blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>')}</div><div class="choices"><span class="choice">${a}</span><span class="choice">${b}</span></div></div>`).join('');
  const chips=d.w.map(w=>`<span class="wchip">${w}</span>`).join('');
  return `<div class="sheet"><div class="name-row">Name:&nbsp;<span class="nl"></span>&nbsp;&nbsp;Date:&nbsp;<span class="nl2"></span></div><div class="ch-bar"><div class="ch-em">${d.em}</div><div class="ch-titles"><div class="bk-lbl">${d.bk} &bull; ${d.ch}</div><h2>${d.t}</h2></div></div><div class="story-box">${d.st.map(s=>`<p>${s}</p>`).join('')}</div><div class="q-head">&#9733; Reading Comprehension</div>${qs}<div class="wf-box"><div class="wf-head">Word Family Words</div><div class="word-grid">${chips}</div></div></div>`;
}

function buildSW(d){
  const tr=d.sw.map(w=>`<div class="trace-item"><div class="tword">${w}</div><div class="kline"></div></div>`).join('');
  const dist=['bat','cat','cup','dog','fun','hat','hot','log','map','nap','pan','pet','rat','run','sit','top','wig','red','big','hop','set','fox','mud','jog','rim'].filter(x=>!d.sw.includes(x));
  const need=Math.max(0,15-d.sw.length);
  const bubWords=shuffle([...d.sw,...shuffle(dist).slice(0,need)]);
  const bubs=bubWords.map(w=>`<div class="bubble">${w}</div>`).join('');
  const swKey=d.sw.map(w=>`<span class="sw-key-word">${w}</span>`).join('');
  const wr=d.sw.map(w=>`<div class="write-item"><div class="write-lbl">${w}</div><div class="kline"></div><div class="kline"></div></div>`).join('');
  return `<div class="sheet"><div class="name-row">Name:&nbsp;<span class="nl"></span>&nbsp;&nbsp;Date:&nbsp;<span class="nl2"></span></div><div class="sw-bar">&#10022; Sight Words Review &mdash; ${d.t}</div><div class="sec-hdr">&#9999;&#65039; Trace It!</div><div class="trace-grid">${tr}</div><div class="sec-hdr">&#128269; Find It! &mdash; Circle the sight words below</div><div class="sw-key">&#128269; Words to find: ${swKey}</div><div class="find-grid">${bubs}</div><div class="sec-hdr">&#9999;&#65039; Write It!</div><div class="write-grid">${wr}</div></div>`;
}

function render(key){
  const d=CH[key];
  if(!d){document.getElementById('ws').innerHTML='<p style="padding:30px;color:#555">Chapter not found.</p>';return;}
  document.getElementById('ws').innerHTML=buildComp(d)+buildSW(d);
}

function populateCh(bk){
  const sel=document.getElementById('sel-ch');
  const chs=getBookChs(bk);
  sel.innerHTML=chs.map(k=>`<option value="${k}">${CH[k].ch}: ${CH[k].t}</option>`).join('');
  return chs[0]||null;
}

function onBookChange(){
  const bk=document.getElementById('sel-book').value;
  const first=populateCh(bk);
  if(first)render(first);
}

function onChChange(){render(document.getElementById('sel-ch').value);}

// Init
const p=new URLSearchParams(location.search);
const initBk=p.get('book')||'1';
const initCh=p.get('ch');
document.getElementById('sel-book').value=initBk;
const firstKey=populateCh(initBk);
const key=initCh?(initBk+'-'+initCh):firstKey;
if(initCh){const el=document.getElementById('sel-ch');el.value=key;if(!el.value&&firstKey)el.value=firstKey;}
render(document.getElementById('sel-ch').value||firstKey);
</script>
